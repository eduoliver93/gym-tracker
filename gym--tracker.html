<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1c20">
<title>GYM TRACKER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & TOKENS (ODAMA UI DESIGN REF) ─────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:        #1a1c20; /* Fundo grafite fosco premium */
  --s1:        #22252a; /* Superfície secundária */
  --s2:        #2c3038; /* Elementos internos / inputs */
  --s3:        #373c46; /* Hovers e destaques suaves */
  --border:    rgba(255,255,255,0.05);
  --border-hi: rgba(255,255,255,0.12);
  --lime:      #c8ff00; /* Lima vibrante da referência */
  --lime-glow: rgba(200,255,0,0.15);
  --red:       #ff4444;
  --green:     #00ff87;
  --text:      #ffffff;
  --muted:     #626875;
  --muted2:    #9097a6;
  --font-d:    'Syne', sans-serif;
  --font-m:    'JetBrains Mono', monospace;
  --shadow:    0 8px 24px rgba(0,0,0,0.2);
  color-scheme: dark;
}

html { scroll-behavior: smooth; height: 100%; }

body {
  font-family: var(--font-d);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  position: relative;
}

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--s3); border-radius:4px; }

/* ── LAYOUT SHELL ───────────────────────────────── */
.shell {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100dvh;
}

/* ── SIDEBAR ────────────────────────────────────── */
.sidebar {
  background: var(--s1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100dvh;
  overflow: hidden;
}

.sb-top {
  padding: 32px 24px 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo {
  font-size: 32px; font-weight: 800;
  letter-spacing: -1px; line-height: 1;
  display: flex; align-items: center; gap: 6px;
}

.logo-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--lime);
  box-shadow: 0 0 10px var(--lime);
}

.logo-sub {
  font-family: var(--font-m);
  font-size: 9px; color: var(--muted2);
  letter-spacing: .2em; text-transform: uppercase;
  margin-top: 6px;
}

/* timer */
.sb-timer {
  padding: 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.section-label {
  font-family: var(--font-m);
  font-size: 10px; letter-spacing: .15em;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 6px;
}

.timer-digits {
  font-family: var(--font-m);
  font-size: 46px; font-weight: 700;
  color: var(--lime); letter-spacing: -2px; line-height: 1;
}

.timer-btns { display: flex; gap: 8px; margin-top: 16px; }

.btn {
  font-family: var(--font-m);
  font-size: 11px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  border: 1px solid var(--border-hi);
  background: var(--s2); color: var(--text);
  padding: 10px 16px; border-radius: 12px;
  cursor: pointer; transition: all .2s; outline: none;
}
.btn:hover { background:var(--s3); border-color:rgba(255,255,255,.2); }
.btn:active { transform: scale(.97); }

.btn-lime { background:var(--lime); color:#000; border-color:var(--lime); flex:1; }
.btn-lime:hover { opacity:.9; color:#000; }
.btn-stop { background:var(--red); color:#fff; border-color:var(--red); flex:1; }

/* progress */
.sb-progress {
  padding: 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.progress-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 12px;
}

.progress-num {
  font-size: 44px; font-weight: 800;
  line-height: 1; letter-spacing: -1px;
}

.progress-meta {
  font-family: var(--font-m); font-size: 11px;
  color: var(--muted2); text-align: right; line-height: 1.6;
}

.progress-meta strong {
  display: block; font-size: 20px; font-weight: 700;
  color: var(--text);
}

.track {
  height: 6px; background: var(--s2);
  border-radius: 99px; overflow: hidden;
}

.track-fill {
  height: 100%;
  background: var(--lime);
  border-radius: 99px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}

/* nav */
.sb-nav {
  padding: 16px;
  flex: 1; overflow-y: auto;
  display: flex; flex-direction: column; gap: 4px;
}

.nav-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: 12px;
  cursor: pointer; border: none; background: none;
  color: var(--muted2);
  font-family: var(--font-d);
  font-size: 13px; font-weight: 700;
  letter-spacing: .02em; text-transform: uppercase;
  width: 100%; text-align: left;
  transition: all .2s;
}

.nav-btn:hover { color:var(--text); background:var(--s2); }
.nav-btn.active { color:#000; background:var(--lime); }

.nav-accent {
  width: 4px; height: 14px;
  border-radius: 2px; background: var(--muted);
  flex-shrink: 0;
}
.nav-btn.active .nav-accent { background: #000; }

.nav-count {
  margin-left: auto;
  font-family: var(--font-m);
  font-size: 10px; color: var(--muted2);
  background: rgba(255,255,255,0.08);
  padding: 2px 8px; border-radius: 20px;
}
.nav-btn.active .nav-count {
  background: rgba(0,0,0,0.15); color: #000;
}

.sb-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: space-between; gap: 8px;
}

.lang-select {
  background: var(--s2); color: var(--text);
  border: 1px solid var(--border-hi);
  padding: 8px 12px; border-radius: 10px;
  font-family: var(--font-m); font-size: 12px;
  cursor: pointer; outline: none; transition: all .2s;
}

/* ── MAIN CONTENT ───────────────────────────────── */
.main {
  display: flex; flex-direction: column;
  min-height: 100dvh; overflow: hidden;
}

.main-header {
  padding: 40px 48px 32px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
}

.headline-wrap .headline-sub {
  font-family: var(--font-m);
  font-size: 11px; letter-spacing: .2em;
  color: var(--muted2); text-transform: uppercase;
  margin-bottom: 8px;
}

.headline {
  font-size: 56px; font-weight: 800; letter-spacing: -2px;
  line-height: .9; text-transform: uppercase;
}

.header-stats { display: flex; gap: 32px; }
.stat-block { text-align: right; }
.stat-val { font-size: 36px; font-weight: 800; line-height: 1; color: var(--lime); }
.stat-key { font-family: var(--font-m); font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }

/* filter bar */
.filter-bar {
  display: flex; gap: 8px;
  padding: 16px 48px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  background: rgba(26,28,32,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: sticky; top: 0; z-index: 10;
}

.filter-chip {
  font-family: var(--font-m);
  font-size: 11px; font-weight: 600;
  text-transform: uppercase;
  padding: 8px 16px; border-radius: 10px;
  border: 1px solid var(--border-hi);
  background: var(--s1); color: var(--muted2);
  cursor: pointer; transition: all .2s;
}
.filter-chip:hover { color:var(--text); background:var(--s2); }
.filter-chip.active { background:var(--lime); color:#000; border-color:var(--lime); }

/* exercise grid */
.ex-grid {
  padding: 32px 48px 48px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
  flex: 1;
}

/* exercise card (Ref. Odama Smooth Design) */
.ex-card {
  position: relative; border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--s1);
  padding: 18px 20px;
  display: flex; align-items: center; gap: 14px;
  transition: all .25s cubic-bezier(.4,0,.2,1);
  box-shadow: var(--shadow);
  animation: fadeUp .3s ease both;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

.ex-card.inactive { opacity: 0.35; }
.ex-card.active { border-color: rgba(200,255,0,0.3); background: rgba(255,255,255,0.02); }
.ex-card.done { border-color: rgba(0,255,135,0.2); background: rgba(0,255,135,0.02); }

/* toggle btn */
.ex-toggle {
  width: 40px; height: 40px;
  border-radius: 12px; border: none;
  background: var(--s2); color: var(--text);
  font-size: 20px; font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; flex-shrink: 0;
}
.ex-toggle:hover { background: var(--s3); }
.ex-card.active .ex-toggle { background:var(--lime); color:#000; }
.ex-card.done .ex-toggle  { background:var(--green); color:#000; }

.ex-info { flex:1; min-width:0; cursor:pointer; }
.ex-name { font-size: 16px; font-weight: 700; color: var(--text); }
.ex-group { font-family: var(--font-m); font-size: 10px; color: var(--muted2); text-transform: uppercase; margin-top: 4px; }

/* custom checkbox */
.check-wrap { flex-shrink: 0; width: 26px; height: 26px; position: relative; }
.check-wrap input { position: absolute; opacity:0; width:100%; height:100%; cursor:pointer; margin:0; z-index:1; }
.check-wrap input:disabled { pointer-events: none; }
.check-box {
  width: 26px; height: 26px; border-radius: 8px;
  border: 2px solid var(--s3); background: var(--s2);
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; pointer-events: none; color: transparent; font-size: 12px;
}
.check-wrap input:checked + .check-box { background: var(--green); border-color: var(--green); color: #000; }

/* ── TOAST ──────────────────────────────────────── */
.toast {
  position: fixed; bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--lime); color: #000;
  font-family: var(--font-m); font-size: 12px; font-weight: 700;
  padding: 16px 32px; border-radius: 14px; z-index: 9000;
  transition: transform .4s cubic-bezier(.175,.885,.32,1.275), opacity .4s;
  opacity: 0; box-shadow: 0 12px 40px rgba(200,255,0,0.25);
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── MOBILE BARS (ODAMA ACCENT FIX) ──────────────────────────────── */
.mob-top {
  display: none;
  position: fixed; top:0; left:0; right:0;
  height: 56px;
  background: rgba(26,28,32,0.92);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  z-index: 200;
  align-items: center; padding: 0 20px; gap: 12px;
  padding-top: env(safe-area-inset-top, 0);
}

.mob-logo { font-size: 20px; font-weight: 800; }

.mob-lang-container { flex: 1; display: flex; justify-content: center; }
.mob-lang-select {
  background: var(--s2); color: var(--text);
  border: 1px solid var(--border-hi);
  padding: 5px 10px; border-radius: 8px;
  font-family: var(--font-m); font-size: 11px; font-weight: 700;
  outline: none; cursor: pointer;
}

.mob-timer-val { font-family: var(--font-m); font-size: 16px; font-weight: 700; color: var(--lime); }
.mob-pct { font-size: 18px; font-weight: 800; color: var(--lime); min-width: 44px; text-align: right; }

.mob-prog-line {
  display: none; position: fixed; top: 56px; left:0; right:0;
  height: 3px; background: var(--s2); z-index: 201;
  margin-top: env(safe-area-inset-top, 0);
}
.mob-prog-fill { height: 100%; background: var(--lime); transition: width .5s; width: 0%; }

.mob-timer-row {
  display: none; position: fixed; top: 59px; left:0; right:0;
  height: 60px; background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 20px; z-index: 199;
  align-items: center; gap: 12px;
  margin-top: env(safe-area-inset-top, 0);
}

.mob-timer-big { font-family: var(--font-m); font-size: 24px; font-weight: 700; color: var(--lime); flex:1; }

.mob-btn {
  font-family: var(--font-m); font-size: 11px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  border: 1px solid var(--border-hi); background: var(--s2); color: var(--text);
  padding: 10px 20px; border-radius: 10px; cursor: pointer; outline: none;
}
.mob-btn.lime { background:var(--lime); color:#000; border-color:var(--lime); }
.mob-btn.red  { background:var(--red); color:#fff; border-color:var(--red); }

.mob-bottom {
  display: none; position: fixed; bottom:0; left:0; right:0;
  background: rgba(34,37,42,0.95);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom, 0);
  box-shadow: 0 -8px 30px rgba(0,0,0,0.3);
}

.mob-tabs { display: flex; height: 64px; align-items: center; }
.mob-tab {
  flex:1; border:none; background:none; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
  color: var(--muted2); font-family: var(--font-m); font-size: 11px; font-weight: 700;
}
.mob-tab.active { color: var(--lime); }
.mob-tab-dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; }
.mob-tab.active .mob-tab-dot { background: var(--lime); }

/* ── RESPONSIVE RESPONSIVENESS FIX (CORRIGIDO) ────────────────── */
@media (max-width: 700px) {
  .shell { 
    grid-template-columns: 1fr; 
  }
  .sidebar { 
    display: none; 
  }
  
  /* Ajustada a altura do padding superior para não empilhar conteúdo rolável sob o topo */
  .main { 
    padding-top: calc(180px + env(safe-area-inset-top, 0)); 
    padding-bottom: calc(80px + env(safe-area-inset-bottom, 0)); 
  }
  .main-header { 
    display: none; 
  }
  
  /* Barra superior estática do topo */
  .mob-top { 
    display: flex; 
    height: 56px;
  }
  
  /* Linha de progresso */
  .mob-prog-line { 
    display: block; 
    top: 56px;
  }
  
  /* Bloco do Cronômetro móvel */
  .mob-timer-row { 
    display: flex; 
    position: fixed;
    top: 59px; 
    left: 0; right: 0;
    height: 60px; 
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 20px; 
    z-index: 199;
    align-items: center; 
    gap: 12px;
    margin-top: env(safe-area-inset-top, 0);
  }
  
  /* FIX: Alinhamento preciso e fundo opaco sem cortar cards */
  .filter-bar { 
    display: flex;
    padding: 12px 20px; 
    position: fixed;
    top: calc(119px + env(safe-area-inset-top, 0)); 
    left: 0; right: 0; 
    height: 56px; 
    z-index: 150;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    overflow-x: auto;
    white-space: nowrap;
    flex-wrap: nowrap;
  }
  
  /* Esconde barra de rolagem horizontal padrão nos filtros */
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip { flex-shrink: 0; }
  
  /* Grid de exercícios começa perfeitamente encadeado abaixo do topo fixo */
  .ex-grid { 
    padding: 16px 20px 24px; 
    grid-template-columns: 1fr; 
    gap: 10px; 
  }
  
  .mob-bottom { 
    display: block; 
  }
}
</style>
</head>
<body>

<div class="mob-top">
  <div class="mob-logo">BODY<span style="color:var(--lime)">.LIFE</span></div>
  
  <div class="mob-lang-container">
    <select class="mob-lang-select" id="mob-lang-sel" onchange="setLang(this.value)">
      <option value="en">EN</option>
      <option value="pt">PT</option>
      <option value="es">ES</option>
    </select>
  </div>

  <div class="mob-timer-val" id="mob-t">00:00</div>
  <div class="mob-pct" id="mob-pct">0%</div>
</div>

<div class="mob-prog-line">
  <div class="mob-prog-fill" id="mob-fill"></div>
</div>

<div class="mob-timer-row">
  <div class="mob-timer-big" id="mob-t2">00:00</div>
  <button class="mob-btn lime" id="mob-toggle" onclick="toggleTimer()">START</button>
  <button class="mob-btn" onclick="resetTimer()">RESET</button>
</div>

<div class="shell">

  <aside class="sidebar">
    <div class="sb-top">
      <div class="logo">GYM<span class="logo-dot"></span></div>
      <div class="logo-sub">Workout Tracker · 2026</div>
    </div>

    <div class="sb-timer">
      <div class="section-label" id="lbl-session">SESSION</div>
      <div class="timer-digits" id="sb-timer">00:00</div>
      <div class="timer-btns">
        <button class="btn btn-lime" id="sb-toggle" onclick="toggleTimer()">START</button>
        <button class="btn" id="sb-reset" onclick="resetTimer()">RESET</button>
      </div>
    </div>

    <div class="sb-progress">
      <div class="progress-row">
        <div class="progress-num" id="sb-pct">0%</div>
        <div class="progress-meta">
          <strong id="sb-fraction">0/0</strong>
          <span id="sb-ex-count">0 exercises</span>
        </div>
      </div>
      <div class="track">
        <div class="track-fill" id="track-fill" style="width:0%"></div>
      </div>
    </div>

    <nav class="sb-nav" id="sb-nav"></nav>

    <div class="sb-footer">
      <select class="lang-select" id="lang-sel" onchange="setLang(this.value)">
        <option value="en">EN</option>
        <option value="pt">PT</option>
        <option value="es">ES</option>
      </select>
      <button class="btn" style="font-size:9px;padding:6px 10px;color:var(--muted)" onclick="resetDay()" id="btn-reset-day">CLEAR DAY</button>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <div class="headline-wrap">
        <div class="headline-sub" id="hd-sub">muscle group</div>
        <h1 class="headline" id="hd-title">LOWER BODY</h1>
      </div>
      <div class="header-stats">
        <div class="stat-block">
          <div class="stat-val" id="hd-pct">0%</div>
          <div class="stat-key">Progress</div>
        </div>
        <div class="stat-block">
          <div class="stat-val" style="color:var(--text)" id="hd-timer">00:00</div>
          <div class="stat-key" id="hd-session-lbl">SESSION</div>
        </div>
      </div>
    </div>

    <div class="filter-bar" id="filter-bar"></div>
    <div class="ex-grid" id="ex-grid"></div>
  </main>
</div>

<div class="mob-bottom">
  <div class="mob-tabs" id="mob-tabs"></div>
</div>

<div class="toast" id="toast">🏆 SESSION COMPLETE</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────

    {id:"l10",key:"Seated Leg Curl",     g:"posterior"},
    {id:"l11",key:"Stiff Deadlift",      g:"posterior"},
    {id:"l12",key:"Hip Thrust",          g:"posterior"},
    {id:"l13",key:"Leg Extension",       g:"quad"},
    {id:"l14",key:"Hack Squat",          g:"quad"},
    {id:"l15",key:"Calf Raise (Stand)",  g:"calf"},
    {id:"l16",key:"Calf Raise (Seat)",   g:"calf"},
  ],
  upper: [
    {id:"u1", key:"Bench Press",          g:"chest"},
    {id:"u2", key:"Incline Press",       g:"chest"},
    {id:"u3", key:"Chest Machine",       g:"chest"},
    {id:"u4", key:"Chest Fly",           g:"chest"},
    {id:"u5", key:"Reverse Fly",         g:"chest"},
    {id:"u6", key:"Push-Ups",            g:"chest"},
    {id:"u7", key:"Lat Pulldown",        g:"back"},
    {id:"u8", key:"Bent Over Row",       g:"back"},
    {id:"u9", key:"Seated Row",          g:"back"},
    {id:"u10",key:"Deadlift",            g:"back"},
    {id:"u11",key:"Shoulder Press",      g:"shoulder"},
    {id:"u12",key:"Lateral Raise",       g:"shoulder"},
    {id:"u13",key:"Front Raise",         g:"shoulder"},
    {id:"u14",key:"Rear Delt Fly",       g:"shoulder"},

// ── STATE ─────────────────────────────────────────────────────────────
const STORE = "gt2026";
let lang, tab, filter, exState, sec, running, timerInt;
let prevPct = 0;

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORE) || "null");
    lang    = s?.lang    || "en";
    tab     = s?.tab     || "lower";
    filter  = "all";
    exState = s?.exState || {};
    sec     = s?.sec     || 0;
  } catch {
    lang = "en"; tab = "lower"; filter = "all"; exState = {}; sec = 0;
  }
  running = false;
}

function persist() {
  try { localStorage.setItem(STORE, JSON.stringify({lang, tab, exState, sec})); } catch {}
}

// ── HELPERS ───────────────────────────────────────────────────────────
const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
const L = () => I18N[lang];

function calcProgress() {
  const all  = Object.values(exState).filter(v => v.active);
  const done = all.filter(v => v.done).length;
  const pct  = all.length > 0 ? Math.round((done / all.length) * 100) : 0;
  return { all, done, pct };
}

function tabActiveCounts() {
  return Object.fromEntries(
    Object.keys(EXERCISES).map(k => [
      k,
      Object.entries(exState).filter(([id, v]) => v.active && EXERCISES[k].some(e => e.id === id)).length
    ])
  );
}

// ── RENDER ────────────────────────────────────────────────────────────
function renderAll() {
  renderNav();
  renderFilters();
  renderGrid();
  updateProgress();
  updateTimerUI();
  updateTexts();
}

function updateTexts() {
  const l = L();
  document.getElementById("lbl-session").textContent  = l.session;
  document.getElementById("hd-sub").textContent       = l.muscleGroup;
  document.getElementById("hd-title").textContent     = l.tabs[tab];
  document.getElementById("hd-session-lbl").textContent = l.session;
  document.getElementById("btn-reset-day").textContent  = l.clearDay;
  document.getElementById("sb-reset").textContent    = l.reset;
  
  document.getElementById("lang-sel").value          = lang;
  document.getElementById("mob-lang-sel").value      = lang;
  
  updateTimerBtn();
}

function renderNav() {
  const l = L();
  const counts = tabActiveCounts();
  document.getElementById("sb-nav").innerHTML = Object.keys(EXERCISES).map(k => `
    <button class="nav-btn${tab===k?" active":""}" onclick="switchTab('${k}')">
      <span class="nav-accent"></span>
      ${l.tabs[k]}
      ${counts[k]>0 ? `<span class="nav-count">${counts[k]}</span>` : ""}
    </button>
  `).join("");

  document.getElementById("mob-tabs").innerHTML = Object.keys(EXERCISES).map(k => `
    <button class="mob-tab${tab===k?" active":""}" onclick="switchTab('${k}')">
      <span class="mob-tab-dot"></span>${l.tabs[k]}
    </button>
  `).join("");
}

function renderFilters() {
  const l = L();
  const groups = ["all", ...new Set(EXERCISES[tab].map(e => e.g))];
  document.getElementById("filter-bar").innerHTML = groups.map(g => `
    <button class="filter-chip${filter===g?" active":""}" onclick="setFilter('${g}')">
      ${l.groups[g] || g}
    </button>
  `).join("");
}

function renderGrid() {
  const l = L();
  const visible = EXERCISES[tab].filter(e => filter === "all" || e.g === filter);
  document.getElementById("ex-grid").innerHTML = visible.map((ex, i) => {
    const st  = exState[ex.id] || {active:false, done:false};
    const cls = st.done ? "done" : st.active ? "active" : "inactive";
    const nm  = l.names[ex.key] || ex.key;
    const gr  = l.groups[ex.g] || ex.g;
    const ico = st.done ? "✓" : st.active ? "−" : "+";
    return `
      <div class="ex-card ${cls}" id="card-${ex.id}" style="animation-delay:${i*0.03}s">
        <button class="ex-toggle" onclick="toggleEx('${ex.id}')" aria-label="${nm}">${ico}</button>
        <div class="ex-info" onclick="toggleExStatus('${ex.id}')">
          <div class="ex-name">${nm}</div>
          <div class="ex-group">${gr}</div>
        </div>
        <div class="check-wrap">
          <input type="checkbox" ${st.active?"":"disabled"} ${st.done?"checked":""} onclick="toggleExStatus('${ex.id}')" aria-label="Mark completed">
          <div class="check-box">✓</div>
        </div>
      </div>
    `;
  }).join("");
}

function updateProgress() {
  const { all, done, pct } = calcProgress();
  const l = L();

  document.getElementById("sb-pct").textContent = `${pct}%`;
  document.getElementById("sb-fraction").textContent = `${done}/${all.length}`;
  document.getElementById("sb-ex-count").textContent = `${all.length} ${l.exercises}`;
  document.getElementById("track-fill").style.width = `${pct}%`;
  document.getElementById("hd-pct").textContent = `${pct}%`;

  document.getElementById("mob-pct").textContent = `${pct}%`;
  document.getElementById("mob-fill").style.width = `${pct}%`;

  const color = pct === 100 ? "var(--green)" : "var(--lime)";
  document.getElementById("sb-pct").style.color = color;
  document.getElementById("hd-pct").style.color = color;
  document.getElementById("mob-pct").style.color = color;

  if (pct === 100 && prevPct < 100 && all.length > 0) {
    showToast();
  }
  prevPct = pct;
}

// ── EVENTS & LOGIC ────────────────────────────────────────────────────
function switchTab(k) {
  tab = k; filter = "all";
  renderFilters(); renderGrid(); renderNav(); updateTexts(); persist();
  window.scrollTo({ top: 0 });
}

function resetDay() {
  if(!confirm("Reset entire tracking dataset?")) return;
  exState = {}; sec = 0; resetTimerLogic();
  persist(); renderAll();
}

function setFilter(g) {
  filter = g; renderFilters(); renderGrid();
}

function toggleEx(id) {
  if (!exState[id]) exState[id] = {active:false, done:false};
  const st = exState[id];

  if (!st.active && !st.done) st.active = true;
  else if (st.active && !st.done) { st.active = false; st.done = false; }
  else if (st.done) { st.active = false; st.done = false; }

  persist(); renderGrid(); renderNav(); updateProgress();
}

function toggleExStatus(id) {
  if (!exState[id] || !exState[id].active) return;
  exState[id].done = !exState[id].done;
  persist(); renderGrid(); updateProgress();
}

function setLang(v) {
  lang = v; renderAll(); persist();
}

// ── TIMER ENGINE ──────────────────────────────────────────────────────
function toggleTimer() {
  if (running) {
    clearInterval(timerInt); running = false;
  } else {
    running = true;
    timerInt = setInterval(() => { sec++; updateTimerUI(); if(sec%5===0) persist(); }, 1000);
  }
  updateTimerBtn();
}

function resetTimerLogic() {
  clearInterval(timerInt); running = false; sec = 0; updateTimerUI(); updateTimerBtn();
}

function resetTimer() {
  resetTimerLogic(); persist();
}

function updateTimerUI() {
  const str = fmt(sec);
  document.getElementById("sb-timer").textContent = str;
  document.getElementById("hd-timer").textContent = str;
  document.getElementById("mob-t").textContent    = str;
  document.getElementById("mob-t2").textContent   = str;
}

function updateTimerBtn() {
  const l = L();
  const txt = running ? l.stop : l.start;
  
  const btn = document.getElementById("sb-toggle");
  if(btn) {
    btn.textContent = txt;
    if(running) { btn.classList.remove("btn-lime"); btn.classList.add("btn-stop"); }
    else { btn.classList.remove("btn-stop"); btn.classList.add("btn-lime"); }
  }

  const mBtn = document.getElementById("mob-toggle");
  if(mBtn) {
    mBtn.textContent = txt;
    if(running) { mBtn.classList.remove("lime"); mBtn.classList.add("red"); }
    else { mBtn.classList.remove("red"); mBtn.classList.add("lime"); }
  }
}

function showToast() {
  const t = document.getElementById("toast");
  t.textContent = `🏆 ${L().complete}`;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3500);
}

window.addEventListener("DOMContentLoaded", () => {
  loadState();
  renderAll();
});
</script>
