<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1c20">
<title>GYM TRACKER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght=400;600;700;800&family=JetBrains+Mono:wght=400;500;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & TOKENS ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:        #1a1c20; 
  --s1:        #22252a; 
  --s2:        #2c3038; 
  --s3:        #373c46; 
  --border:    rgba(255,255,255,0.05);
  --border-hi: rgba(255,255,255,0.12);
  --lime:      #c8ff00; 
  --lime-glow: rgba(200,255,0,0.15);
  --red:       #ff4444;
  --green:     #00ff87;
  --text:      #ffffff;
  --muted:     #626875;
  --muted2:    #9097a6;
  --font-d:    'Syne', sans-serif;
  --font-m:    'JetBrains Mono', monospace;
  --shadow:    0 4px 12px rgba(0,0,0,0.15);
  color-scheme: dark;
}

html { scroll-behavior: smooth; height: 100%; }

body {
  font-family: var(--font-d);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  position: relative;
}

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--s3); border-radius:4px; }

/* ── LAYOUT SHELL ───────────────────────────────── */
.shell {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100dvh;
}

/* ── SIDEBAR ────────────────────────────────────── */
.sidebar {
  background: var(--s1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100dvh;
  overflow: hidden;
}

.sb-top {
  padding: 32px 24px 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo {
  font-size: 32px; font-weight: 800;
  letter-spacing: -1px; line-height: 1;
  display: flex; align-items: center; gap: 6px;
}

.logo-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--lime);
  box-shadow: 0 0 10px var(--lime);
}

.logo-sub {
  font-family: var(--font-m);
  font-size: 9px; color: var(--muted2);
  letter-spacing: .2em; text-transform: uppercase;
  margin-top: 6px;
}

/* timer */
.sb-timer {
  padding: 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.section-label {
  font-family: var(--font-m);
  font-size: 10px; letter-spacing: .15em;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 6px;
}

.timer-digits {
  font-family: var(--font-m);
  font-size: 46px; font-weight: 700;
  color: var(--lime); letter-spacing: -2px; line-height: 1;
}

.timer-btns { display: flex; gap: 8px; margin-top: 16px; }

.btn {
  font-family: var(--font-m);
  font-size: 11px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  border: 1px solid var(--border-hi);
  background: var(--s2); color: var(--text);
  padding: 10px 16px; border-radius: 12px;
  cursor: pointer; transition: all .2s; outline: none;
}
.btn:hover { background:var(--s3); border-color:rgba(255,255,255,.2); }
.btn:active { transform: scale(.97); }

.btn-lime { background:var(--lime); color:#000; border-color:var(--lime); flex:1; }
.btn-lime:hover { opacity:.9; color:#000; }

/* progress */
.sb-progress {
  padding: 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.progress-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 12px;
}

.progress-num {
  font-size: 44px; font-weight: 800;
  line-height: 1; letter-spacing: -1px;
}

.progress-meta {
  font-family: var(--font-m); font-size: 11px;
  color: var(--muted2); text-align: right; line-height: 1.6;
}

.progress-meta strong {
  display: block; font-size: 20px; font-weight: 700;
  color: var(--text);
}

.track {
  height: 6px; background: var(--s2);
  border-radius: 99px; overflow: hidden;
}

.track-fill {
  height: 100%;
  background: var(--lime);
  border-radius: 99px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}

/* nav */
.sb-nav {
  padding: 16px;
  flex: 1; overflow-y: auto;
  display: flex; flex-direction: column; gap: 4px;
}

.nav-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: 12px;
  cursor: pointer; border: none; background: none;
  color: var(--muted2);
  font-family: var(--font-d);
  font-size: 13px; font-weight: 700;
  letter-spacing: .02em; text-transform: uppercase;
  width: 100%; text-align: left;
  transition: all .2s;
}

.nav-btn:hover { color:var(--text); background:var(--s2); }
.nav-btn.active { color:#000; background:var(--lime); }

.nav-accent {
  width: 4px; height: 14px;
  border-radius: 2px; background: var(--muted);
  flex-shrink: 0;
}
.nav-btn.active .nav-accent { background: #000; }

.nav-count {
  margin-left: auto;
  font-family: var(--font-m);
  font-size: 10px; color: var(--muted2);
  background: rgba(255,255,255,0.08);
  padding: 2px 8px; border-radius: 20px;
}
.nav-btn.active .nav-count {
  background: rgba(0,0,0,0.15); color: #000;
}

.sb-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: space-between; gap: 8px;
}

.lang-select {
  background: var(--s2); color: var(--text);
  border: 1px solid var(--border-hi);
  padding: 8px 12px; border-radius: 10px;
  font-family: var(--font-m); font-size: 12px;
  cursor: pointer; outline: none; transition: all .2s;
}

/* ── MAIN CONTENT ───────────────────────────────── */
.main {
  display: flex; flex-direction: column;
  min-height: 100dvh; overflow: hidden;
}

.main-header {
  padding: 40px 48px 32px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
}

.headline-wrap .headline-sub {
  font-family: var(--font-m);
  font-size: 11px; letter-spacing: .2em;
  color: var(--muted2); text-transform: uppercase;
  margin-bottom: 8px;
}

.headline {
  font-size: 56px; font-weight: 800; letter-spacing: -2px;
  line-height: .9; text-transform: uppercase;
}

.header-stats { display: flex; gap: 32px; }
.sidebar-stats { display: flex; gap: 32px; }
.stat-block { text-align: right; }
.stat-val { font-size: 36px; font-weight: 800; line-height: 1; color: var(--lime); }
.stat-key { font-family: var(--font-m); font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }

/* filter bar */
.filter-bar {
  display: flex; gap: 8px;
  padding: 16px 48px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  background: rgba(26,28,32,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: sticky; top: 0; z-index: 10;
}

.filter-chip {
  font-family: var(--font-m);
  font-size: 11px; font-weight: 600;
  text-transform: uppercase;
  padding: 8px 16px; border-radius: 10px;
  border: 1px solid var(--border-hi);
  background: var(--s1); color: var(--muted2);
  cursor: pointer; transition: all .2s;
}
.filter-chip:hover { color:var(--text); background:var(--s2); }
.filter-chip.active { background:var(--lime); color:#000; border-color:var(--lime); }

/* empty placeholder state */
.empty-state {
  width: 100%;
  text-align: center;
  padding: 60px 20px;
  color: var(--muted2);
  font-size: 14px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── CORREÇÃO DE EMPILHAMENTO (UM EMBAIXO DO OUTRO) ── */
.ex-grid {
  padding: 32px 48px 48px;
  display: flex;
  flex-direction: column;
  gap: 10px; /* Alinhamento colado igual ao print */
  flex: 1;
}

/* estrutura de swipe */
.swipe-container {
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  width: 100%;
  touch-action: pan-y;
}

.swipe-background {
  position: absolute;
  top: 0; right: 0; bottom: 0; left: 0;
  background: var(--red);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 24px;
  border-radius: 16px;
  z-index: 1;
  opacity: 0;
  transition: opacity 0.15s ease;
}

.ex-card {
  position: relative;
  z-index: 2;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--s1);
  padding: 20px;
  display: flex; align-items: center; gap: 16px;
  transform: translateX(0);
  transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  will-change: transform;
  width: 100%;
}

/* Estados visuais do card */
.ex-card.inactive { opacity: 0.35; }
.ex-card.active { border-color: rgba(200,255,0,0.3); background: rgba(255,255,255,0.02); }
.ex-card.done { border-color: rgba(0,255,135,0.3); background: rgba(0,255,135,0.02); }

.ex-toggle {
  width: 40px; height: 40px;
  border-radius: 12px; border: none;
  background: var(--s2); color: var(--text);
  font-size: 20px; font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; flex-shrink: 0;
}
.ex-toggle:hover { background: var(--s3); }
.ex-card.active .ex-toggle { background:var(--lime); color:#000; }
.ex-card.done .ex-toggle  { background:var(--green); color:#000; }

.ex-remove-btn {
  background: none; border: none; color: var(--muted);
  font-size: 18px; cursor: pointer; padding: 8px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px; transition: all 0.2s; flex-shrink: 0;
}
.ex-remove-btn:hover { color: var(--red); background: rgba(255, 68, 68, 0.1); }

.ex-info { flex:1; min-width:0; }
.ex-name { font-size: 16px; font-weight: 700; color: var(--text); }
.ex-group { font-family: var(--font-m); font-size: 10px; color: var(--muted2); text-transform: uppercase; margin-top: 4px; }

/* custom checkbox */
.check-wrap { flex-shrink: 0; width: 32px; height: 32px; position: relative; }
.check-wrap input { position: absolute; opacity:0; width:100%; height:100%; cursor:pointer; margin:0; z-index:1; }
.check-box {
  width: 32px; height: 32px; border-radius: 10px;
  border: 2px solid var(--s3); background: var(--s2);
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; pointer-events: none; color: transparent; font-size: 14px; font-weight: bold;
}
.check-wrap input:checked + .check-box { background: var(--green); border-color: var(--green); color: #000; }

/* ── TOAST ──────────────────────────────────────── */
.toast {
  position: fixed; bottom: 100px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--lime); color: #000;
  font-family: var(--font-m); font-size: 12px; font-weight: 700;
  padding: 16px 32px; border-radius: 14px; z-index: 9000;
  transition: transform .4s cubic-bezier(.175,.885,.32,1.275), opacity .4s;
  opacity: 0; box-shadow: 0 12px 40px rgba(200,255,0,0.25);
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── MODAL ──────────────────────────────────────── */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(20,22,25,0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
  z-index: 10000; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.4s ease; padding: 24px;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal-card {
  background: var(--s1); border: 1px solid var(--border-hi); width: 100%; max-width: 420px;
  border-radius: 24px; padding: 40px 32px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  transform: translateY(40px); transition: transform 0.4s cubic-bezier(.175,.885,.32,1.2), opacity 0.4s; opacity: 0;
}
.modal-overlay.open .modal-card { transform: translateY(0); opacity: 1; }
.modal-icon { font-size: 54px; margin-bottom: 16px; }
.modal-title { font-size: 32px; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 8px; }
.modal-text { font-size: 15px; color: var(--muted2); margin-bottom: 32px; line-height: 1.5; }
.modal-summary-box { background: var(--s2); border-radius: 16px; padding: 20px; margin-bottom: 32px; }
.modal-time-lbl { font-family: var(--font-m); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
.modal-time-val { font-family: var(--font-m); font-size: 48px; font-weight: 700; color: var(--lime); margin-top: 4px; }

/* ── MOBILE BARS ── */
.mob-top {
  display: none; position: fixed; top:0; left:0; right:0; height: 56px;
  background: rgba(26,28,32,0.92); border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 200;
  align-items: center; padding: 0 20px; gap: 12px; padding-top: env(safe-area-inset-top, 0);
}
.mob-logo { font-size: 20px; font-weight: 800; }
.mob-lang-container { flex: 1; display: flex; justify-content: center; }
.mob-lang-select {
  background: var(--s2); color: var(--text); border: 1px solid var(--border-hi);
  padding: 5px 10px; border-radius: 8px; font-family: var(--font-m); font-size: 11px; font-weight: 700;
}
.mob-timer-val { font-family: var(--font-m); font-size: 16px; font-weight: 700; color: var(--lime); }
.mob-pct { font-size: 18px; font-weight: 800; color: var(--lime); min-width: 44px; text-align: right; }

.mob-prog-line {
  display: none; position: fixed; top: 56px; left:0; right:0; height: 3px; background: var(--s2); z-index: 201;
  margin-top: env(safe-area-inset-top, 0);
}
.mob-prog-fill { height: 100%; background: var(--lime); transition: width .5s; width: 0%; }

.mob-timer-row {
  display: none; position: fixed; top: 59px; left:0; right:0; height: 60px; background: var(--bg);
  border-bottom: 1px solid var(--border); padding: 0 20px; z-index: 199; align-items: center; gap: 12px;
  margin-top: env(safe-area-inset-top, 0);
}
.mob-timer-big { font-family: var(--font-m); font-size: 24px; font-weight: 700; color: var(--lime); flex:1; }

.mob-btn {
  font-family: var(--font-m); font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
  border: 1px solid var(--border-hi); background: var(--s2); color: var(--text); padding: 10px 16px; border-radius: 10px;
}
.mob-btn.lime { background:var(--lime); color:#000; border-color:var(--lime); }
.mob-btn.red  { background:var(--red); color:#fff; border-color:var(--red); }

.mob-bottom {
  display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #15171a; 
  border-top: 1px solid var(--border-hi); z-index: 99999 !important; pointer-events: auto !important;
  padding: 12px 14px calc(12px + env(safe-area-inset-bottom, 0)); box-shadow: 0 -10px 35px rgba(0,0,0,0.6);
}
.mob-tabs { display: flex; gap: 4px; align-items: center; justify-content: space-between; width: 100%; }
.mob-tab {
  flex: 1; font-family: var(--font-m); font-size: 8px; font-weight: 700; letter-spacing: .02em; text-transform: uppercase;
  border: 1px solid var(--border-hi); background: var(--s1); color: var(--muted2); padding: 12px 1px; border-radius: 10px;
  cursor: pointer !important; pointer-events: auto !important; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 5px; height: 52px; transition: background 0.15s, color 0.15s, transform 0.1s;
}
.mob-tab.active { background: var(--lime); color: #000; border-color: var(--lime); box-shadow: 0 4px 16px rgba(200,255,0,0.25); }
.mob-tab-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.15); }
.mob-tab.active .mob-tab-dot { background: #000; }

@media (max-width: 700px) {
  .shell { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main { padding-top: calc(180px + env(safe-area-inset-top, 0)); padding-bottom: calc(110px + env(safe-area-inset-bottom, 0)) !important; }
  .main-header { display: none; }
  .mob-top { display: flex; height: 56px; }
  .mob-prog-line { display: block; top: 56px; }
  .mob-timer-row { display: flex; position: fixed; top: 59px; left: 0; right: 0; height: 60px; z-index: 199; }
  .filter-bar { 
    display: flex; padding: 12px 20px; position: fixed; top: calc(119px + env(safe-area-inset-top, 0)); 
    left: 0; right: 0; height: 56px; z-index: 150; border-bottom: 1px solid var(--border);
    background: var(--bg); overflow-x: auto; white-space: nowrap; flex-wrap: nowrap;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip { flex-shrink: 0; }
  .ex-grid { padding: 16px 20px 32px; position: relative; z-index: 1; }
  .mob-bottom { display: block; }
}
</style>
</head>
<body>

<div class="mob-top">
  <div class="mob-logo">GYM<span style="color:var(--lime)">.</span></div>
  <div class="mob-lang-container">
    <select class="mob-lang-select" id="mob-lang-sel" onchange="setLang(this.value)">
      <option value="en">EN</option>
      <option value="pt">PT</option>
      <option value="es">ES</option>
    </select>
  </div>
  <div class="mob-timer-val" id="mob-t">00:00</div>
  <div class="mob-pct" id="mob-pct">0%</div>
</div>

<div class="mob-prog-line"><div class="mob-prog-fill" id="mob-fill"></div></div>

<div class="mob-timer-row">
  <div class="mob-timer-big" id="mob-t2">00:00</div>
  <button class="mob-btn lime" id="mob-toggle" onclick="toggleTimer()">START</button>
  <button class="mob-btn red" id="mob-finish-btn" onclick="finishWorkout()">FINALIZAR</button>
</div>

<div class="shell">
  <aside class="sidebar">
    <div class="sb-top">
      <div class="logo">GYM<span class="logo-dot"></span></div>
      <div class="logo-sub">Workout Tracker · 2026</div>
    </div>
    <div class="sb-timer">
      <div class="section-label" id="lbl-session">SESSION</div>
      <div class="timer-digits" id="sb-timer">00:00</div>
      <div class="timer-btns">
        <button class="btn btn-lime" id="sb-toggle" onclick="toggleTimer()">START</button>
        <button class="btn" style="background:var(--red); border-color:var(--red)" onclick="finishWorkout()" id="sb-finish">FINALIZAR</button>
      </div>
    </div>
    <div class="sb-progress">
      <div class="progress-row">
        <div class="progress-num" id="sb-pct">0%</div>
        <div class="progress-meta"><strong id="sb-fraction">0/0</strong><span id="sb-ex-count">0 exercises</span></div>
      </div>
      <div class="track"><div class="track-fill" id="track-fill" style="width:0%"></div></div>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-footer">
      <select class="lang-select" id="lang-sel" onchange="setLang(this.value)">
        <option value="en">EN</option>
        <option value="pt">PT</option>
        <option value="es">ES</option>
      </select>
      <button class="btn" style="font-size:9px;padding:6px 10px;color:var(--muted)" onclick="resetDay()" id="btn-reset-day">CLEAR DAY</button>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <div class="headline-wrap">
        <div class="headline-sub" id="hd-sub">muscle group</div>
        <h1 class="headline" id="hd-title">EXERCÍCIOS DE HOJE</h1>
      </div>
      <div class="header-stats">
        <div class="stat-block"><div class="stat-val" id="hd-pct">0%</div><div class="stat-key">Progress</div></div>
        <div class="stat-block"><div class="stat-val" style="color:var(--text)" id="hd-timer">00:00</div><div class="stat-key" id="hd-session-lbl">SESSION</div></div>
      </div>
    </div>
    <div class="filter-bar" id="filter-bar"></div>
    <div class="ex-grid" id="ex-grid"></div>
  </main>
</div>

<div class="mob-bottom"><div class="mob-tabs" id="mob-tabs"></div></div>

<div class="modal-overlay" id="finish-modal">
  <div class="modal-card">
    <div class="modal-icon">🔥</div>
    <div class="modal-title" id="modal-title">TREINO FINALIZADO!</div>
    <div class="modal-text" id="modal-text">Consistência é tudo. Aqui está o resumo do seu treino de hoje:</div>
    <div class="modal-summary-box">
      <div class="modal-time-lbl" id="modal-time-lbl">TEMPO TOTAL</div>
      <div class="modal-time-val" id="modal-duration">00:00</div>
    </div>
    <button class="btn btn-lime" style="width:100%; padding:14px;" onclick="closeModal()">FECHAR</button>
  </div>
</div>

// ── STATE STORE ───────────────────────────────────────────────────────
const STORE = "gt2026_v3";
let lang, tab, filter, exState, sec, running, timerInt;
let currentDay = "mon"; 
let prevPct = 0;

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORE) || "null");
    lang    = s?.lang    || "pt";
    tab     = s?.tab     || "today";
    filter  = s?.filter  || "all";
    exState = s?.exState || {};
    sec     = s?.sec     || 0;
    currentDay = s?.currentDay || "mon";
  } catch {
    lang = "pt"; tab = "today"; filter = "all"; exState = {}; sec = 0; currentDay = "mon";
  }
  running = false;
  rebuildTodayDataset();
}

function persist() {
  try { localStorage.setItem(STORE, JSON.stringify({lang, tab, filter, exState, sec, currentDay})); } catch {}
}

function rebuildTodayDataset() {
  EXERCISES.today = [];
  ["lower", "upper", "core"].forEach(t => {
    EXERCISES[t].forEach(ex => {
      if (exState[ex.id]?.[currentDay]) {
        EXERCISES.today.push(ex);
      }
    });
  });
}

const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
const L = () => I18N[lang];

function calcProgress() {
  const all = EXERCISES.today;
  const done = all.filter(ex => exState[ex.id]?.done?.[currentDay]).length;
  const pct  = all.length > 0 ? Math.round((done / all.length) * 100) : 0;
  return { all, done, pct };
}

function tabActiveCounts() {
  const counts = { today: EXERCISES.today.length, lower: 0, upper: 0, core: 0 };
  ["lower", "upper", "core"].forEach(t => {
    EXERCISES[t].forEach(ex => {
      if (exState[ex.id]?.[currentDay]) counts[t]++;
    });
  });
  return counts;
}

// ── UI RENDERING & INJECTIONS ─────────────────────────────────────────
function renderTabs() {
  const nav = document.getElementById("sb-nav");
  const mTabs = document.getElementById("mob-tabs");
  const counts = tabActiveCounts();
  let html = "", mHtml = "";
  
  ["today", "lower", "upper", "core"].forEach(k => {
    const activeCls = tab === k ? "active" : "";
    html += `
      <button class="nav-btn ${activeCls}" onclick="setTab('${k}')">
        <span class="nav-accent"></span>${L().tabs[k]}<span class="nav-count">${counts[k]}</span>
      </button>`;
    mHtml += `
      <button class="mob-tab ${activeCls}" onclick="setTab('${k}')">
        <div>${L().tabs[k]}</div><div class="mob-tab-dot"></div>
      </button>`;
  });
  nav.innerHTML = html; mTabs.innerHTML = mHtml;
}

function renderFilters() {
  const bar = document.getElementById("filter-bar");
  if (tab === "today") {
    bar.innerHTML = WEEKDAYS.map(d => `<button class="filter-chip ${currentDay === d ? "active" : ""}" onclick="setDay('${d}')">${L().weekdays[d]}</button>`).join("");
    return;
  }
  const groups = new Set(["all"]);
  EXERCISES[tab].forEach(ex => groups.add(ex.g));
  bar.innerHTML = Array.from(groups).map(g => `<button class="filter-chip ${filter === g ? "active" : ""}" onclick="setFilter('${g}')">${L().groups[g] || g.toUpperCase()}</button>`).join("");
}

function renderGrid() {
  const grid = document.getElementById("ex-grid");
  const list = tab === "today" ? EXERCISES.today : EXERCISES[tab];
  let filtered = list;
  if (tab !== "today" && filter !== "all") filtered = list.filter(ex => ex.g === filter);
  
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">${L().empty}</div>`;
    return;
  }
  
  grid.innerHTML = filtered.map(ex => {
    const isAct = !!exState[ex.id]?.[currentDay];
    const isDone = !!exState[ex.id]?.done?.[currentDay];
    const transName = L().names[ex.key] || ex.key;
    const gLabel = L().groups[ex.g] || ex.g.toUpperCase();
    
    if (tab === "today") {
      return `
        <div class="swipe-container" data-id="${ex.id}">
          <div class="swipe-background">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          </div>
          <div class="ex-card ${isDone ? 'done' : ''}">
            <div class="check-wrap">
              <input type="checkbox" ${isDone ? "checked" : ""} onchange="toggleExerciseDone('${ex.id}', this.checked)">
              <div class="check-box">✓</div>
            </div>
            <div class="ex-info">
              <div class="ex-name">${transName}</div>
              <div class="ex-group">${gLabel}</div>
            </div>
            <button class="ex-remove-btn" onclick="removeExerciseFromDay('${ex.id}', event)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            </button>
          </div>
        </div>`;
    } else {
      return `
        <div class="ex-card ${isAct ? 'active' : 'inactive'}">
          <button class="ex-toggle" onclick="toggleExerciseSetup('${ex.id}', event)">${isAct ? '✓' : '+'}</button>
          <div class="ex-info" onclick="toggleExerciseSetup('${ex.id}', event)">
            <div class="ex-name">${transName}</div><div class="ex-group">${gLabel}</div>
          </div>
        </div>`;
    }
  }).join("");

  if (tab === "today") attachSwipeEvents();
}

// ── SWIPE ENGINE PARA MOBILE TOUCH CONTROLS ───────────────────────────
function attachSwipeEvents() {
  const containers = document.querySelectorAll('.swipe-container');
  
  containers.forEach(container => {
    const card = container.querySelector('.ex-card');
    const bg = container.querySelector('.swipe-background');
    const id = container.getAttribute('data-id');
    
    let startX = 0;
    let startY = 0;
    let currentX = 0;
    let isSwiping = false;
    let isScrollZone = false;

    // Reset nativo
    card.outerHTML = card.outerHTML; 
    const cleanCard = container.querySelector('.ex-card');

    cleanCard.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      currentX = 0;
      isSwiping = false;
      isScrollZone = false;
      cleanCard.style.transition = 'none';
    }, { passive: true });

    cleanCard.addEventListener('touchmove', (e) => {
      if (isScrollZone) return;

      const deltaX = e.touches[0].clientX - startX;
      const deltaY = e.touches[0].clientY - startY;

      if (!isSwiping && Math.abs(deltaY) > Math.abs(deltaX)) {
        isScrollZone = true;
        return;
      }

      if (Math.abs(deltaX) > 10) {
        isSwiping = true;
      }

      if (isSwiping && deltaX < 0) {
        if(e.cancelable) e.preventDefault();
        currentX = Math.max(deltaX, -140);
        bg.style.opacity = '1';
        cleanCard.style.transform = `translateX(${currentX}px)`;
      }
    }, { passive: false });

    cleanCard.addEventListener('touchend', () => {
      if (!isSwiping) return;
      cleanCard.style.transition = 'transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)';
      
      if (currentX < -80) {
        cleanCard.style.transform = 'translateX(-105%)';
        bg.style.opacity = '0';
        setTimeout(() => {
          removeExerciseFromDay(id);
        }, 220);
      } else {
        cleanCard.style.transform = 'translateX(0px)';
        setTimeout(() => { bg.style.opacity = '0'; }, 150);
      }
    }, { passive: true });
  });
}

function syncHeaderAndProgress() {
  const { all, done, pct } = calcProgress();
  document.getElementById("sb-pct").innerText = pct + "%";
  document.getElementById("hd-pct").innerText = pct + "%";
  document.getElementById("mob-pct").innerText = pct + "%";
  document.getElementById("track-fill").style.width = pct + "%";
  document.getElementById("mob-fill").style.width = pct + "%";
  document.getElementById("sb-fraction").innerText = `${done}/${all.length}`;
  document.getElementById("sb-ex-count").innerText = `${all.length} ${L().exercises}`;
  
  if (tab === "today") {
    document.getElementById("hd-title").innerText = L().weekdays[currentDay];
    document.getElementById("hd-sub").innerText = L().tabs.today;
  } else {
    document.getElementById("hd-title").innerText = L().tabs[tab];
    document.getElementById("hd-sub").innerText = L().muscleGroup;
  }
  if (pct === 100 && prevPct < 100 && all.length > 0) triggerToast();
  prevPct = pct;
}

// ── HANDLERS & CORE ENGINE ───────────────────────────────────────────
function setTab(t) { tab = t; filter = "all"; renderTabs(); renderFilters(); renderGrid(); syncHeaderAndProgress(); persist(); }
function setFilter(f) { filter = f; renderFilters(); renderGrid(); persist(); }
function setDay(d) { currentDay = d; rebuildTodayDataset(); renderFilters(); renderGrid(); renderTabs(); syncHeaderAndProgress(); persist(); }

function toggleExerciseSetup(id, event) {
  if (event) event.stopPropagation();
  if (!exState[id]) exState[id] = {};
  exState[id][currentDay] = !exState[id][currentDay];
  if (!exState[id][currentDay] && exState[id].done) exState[id].done[currentDay] = false;
  rebuildTodayDataset(); renderGrid(); renderTabs(); syncHeaderAndProgress(); persist();
}

function removeExerciseFromDay(id, event) {
  if (event) event.stopPropagation();
  if (exState[id]) {
    exState[id][currentDay] = false;
    if (exState[id].done) exState[id].done[currentDay] = false;
  }
  rebuildTodayDataset(); renderGrid(); renderTabs(); syncHeaderAndProgress(); persist();
}

function toggleExerciseDone(id, checked) {
  if (!exState[id]) exState[id] = {};
  if (!exState[id].done) exState[id].done = {};
  exState[id].done[currentDay] = checked;
  renderGrid(); syncHeaderAndProgress(); persist();
}

function setLang(l) {
  lang = l; document.getElementById("lang-sel").value = l; document.getElementById("mob-lang-sel").value = l;
  const strings = {
    pt: { resTitle: "TREINO FINALIZADO!", resTxt: "Consistência é tudo. Aqui está o resumo do seu treino:", resTime: "TEMPO TOTAL" },
    en: { resTitle: "WORKOUT COMPLETE!", resTxt: "Consistency is key. Here is your workout summary:", resTime: "TOTAL TIME" },
    es: { resTitle: "¡ENTRENO TERMINADO!", resTxt: "La consistencia lo es todo. Aquí está el resumen:", resTime: "TIEMPO TOTAL" }
  }[l] || strings.pt;
  
  document.getElementById("modal-title").innerText = strings.resTitle;
  document.getElementById("modal-text").innerText = strings.resTxt;
  document.getElementById("modal-time-lbl").innerText = strings.resTime;
  document.getElementById("btn-reset-day").innerText = L().clearDay;
  renderTabs(); renderFilters(); renderGrid(); syncHeaderAndProgress(); updateTimerUI(); persist();
}

function toggleTimer() {
  running = !running;
  const b1 = document.getElementById("sb-toggle"); const b2 = document.getElementById("mob-toggle");
  if (running) {
    b1.innerText = L().stop; b1.style.background = "var(--s3)"; b2.innerText = L().stop; b2.className = "mob-btn red";
    timerInt = setInterval(() => { sec++; updateTimerUI(); if(sec % 5 === 0) persist(); }, 1000);
  } else {
    clearInterval(timerInt); b1.innerText = L().start; b1.style.background = "var(--lime)"; b2.innerText = L().start; b2.className = "mob-btn lime"; persist();
  }
}

function updateTimerUI() {
  const str = fmt(sec);
  document.getElementById("sb-timer").innerText = str; document.getElementById("hd-timer").innerText = str;
  document.getElementById("mob-t").innerText = str; document.getElementById("mob-t2").innerText = str;
}

function finishWorkout() { if(running) toggleTimer(); document.getElementById("modal-duration").innerText = fmt(sec); document.getElementById("finish-modal").classList.add("open"); }
function closeModal() { document.getElementById("finish-modal").classList.remove("open"); sec = 0; updateTimerUI(); resetDay(); }

function resetDay() {
  const list = tab === "today" ? EXERCISES.today : EXERCISES[tab];
  list.forEach(ex => { if (exState[ex.id]?.done) exState[ex.id].done[currentDay] = false; });
  renderGrid(); syncHeaderAndProgress(); persist();
}

function triggerToast() {
  const t = document.getElementById("toast"); t.innerText = `🏆 ${L().complete}`; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

window.addEventListener("DOMContentLoaded", () => { loadState(); setLang(lang); });
