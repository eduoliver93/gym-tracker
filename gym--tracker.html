<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1c20">
<title>BODY LIFE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght=400;600;700;800&family=JetBrains+Mono:wght=400;500;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & TOKENS ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:        #1a1c20; 
  --s1:        #22252a; 
  --s2:        #2c3038; 
  --s3:        #373c46; 
  --border:    rgba(255,255,255,0.05);
  --border-hi: rgba(255,255,255,0.12);
  --lime:      #c8ff00; 
  --lime-glow: rgba(200,255,0,0.15);
  --red:       #ff4444;
  --green:     #00ff87;
  --cyan:      #00d2ff;
  --text:      #ffffff;
  --muted:     #626875;
  --muted2:    #9097a6;
  --font-d:    'Syne', sans-serif;
  --font-m:    'JetBrains Mono', monospace;
  --shadow:    0 4px 12px rgba(0,0,0,0.15);
  color-scheme: dark;
}

html { scroll-behavior: smooth; height: 100%; }

body {
  font-family: var(--font-d);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  position: relative;
}

.app-container {
  max-width: 600px;
  margin: 0 auto;
  background: var(--bg);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding-bottom: calc(80px + env(safe-area-inset-bottom, 0)); 
}

/* ── HEADER DA MARCA ── */
.brand-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 16px 10px;
}

.brand-title {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -1px;
}
.brand-title span { color: var(--lime); }

.brand-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.lang-dropdown {
  background: var(--s2);
  color: var(--text);
  border: 1px solid var(--border-hi);
  padding: 8px 12px;
  border-radius: 10px;
  font-family: var(--font-m);
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  outline: none;
}

.global-pct {
  font-size: 24px;
  font-weight: 800;
  color: var(--lime);
}

/* ── CONTROL PANEL ── */
.control-panel {
  padding: 10px 16px 20px;
  border-bottom: 1px solid var(--border);
}

.timer-section {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.timer-wrapper .lbl {
  font-family: var(--font-m);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .1em;
  text-transform: uppercase;
}

.timer-display {
  font-family: var(--font-m);
  font-size: 42px;
  font-weight: 700;
  color: var(--lime);
  line-height: 1.1;
}

.timer-controls {
  display: flex;
  gap: 8px;
}

.btn-start {
  background: var(--lime);
  color: #000;
  font-family: var(--font-m);
  font-size: 14px;
  font-weight: 800;
  padding: 12px 24px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
}

.btn-reset {
  background: var(--s2);
  color: var(--text);
  border: 1px solid var(--border-hi);
  font-family: var(--font-m);
  font-size: 14px;
  font-weight: 700;
  padding: 12px 20px;
  border-radius: 12px;
  cursor: pointer;
}

.workout-actions-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.action-btns {
  display: flex;
  gap: 12px;
}

.btn-train {
  background: var(--cyan);
  color: #000;
  font-family: var(--font-m);
  font-size: 13px;
  font-weight: 700;
  padding: 12px 24px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  text-transform: uppercase;
}

.btn-finish {
  background: var(--red);
  color: #fff;
  font-family: var(--font-m);
  font-size: 13px;
  font-weight: 700;
  padding: 12px 24px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  text-transform: uppercase;
}

.secondary-timer {
  font-family: var(--font-m);
  font-size: 24px;
  font-weight: 700;
  color: #fff;
}

/* ── DIAS DA SEMANA ── */
.weekday-bar {
  display: flex;
  gap: 6px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.weekday-bar::-webkit-scrollbar { display: none; }

.day-chip {
  flex: 1;
  min-width: 75px;
  text-align: center;
  font-family: var(--font-m);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  padding: 10px 6px;
  border-radius: 12px;
  border: 1px solid var(--border-hi);
  background: var(--s1);
  color: var(--muted2);
  cursor: pointer;
  transition: all .2s;
}
.day-chip.active {
  background: var(--lime);
  color: #000;
  border-color: var(--lime);
  font-weight: 700;
}

/* ── LISTA DE EXERCÍCIOS ── */
.ex-grid {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}

.swipe-container {
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  width: 100%;
}

.ex-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.ex-card.done {
  border-color: rgba(0,255,135,0.3);
  background: rgba(0,255,135,0.02);
}

.ex-info { flex: 1; }
.ex-name { font-size: 16px; font-weight: 700; }
.ex-group { font-family: var(--font-m); font-size: 10px; color: var(--muted2); text-transform: uppercase; margin-top: 4px; }

.check-wrap { width: 32px; height: 32px; position: relative; }
.check-wrap input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; margin: 0; z-index: 2; }
.check-box {
  width: 32px; height: 32px; border-radius: 10px;
  border: 2px solid var(--s3); background: var(--s2);
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; color: transparent; font-size: 14px; font-weight: bold;
}
.check-wrap input:checked + .check-box { background: var(--green); border-color: var(--green); color: #000; }

.indicator-tag {
  font-family: var(--font-m);
  font-size: 9px;
  padding: 4px 8px;
  border-radius: 6px;
  background: var(--s2);
  color: var(--muted2);
}
.indicator-tag.active {
  background: var(--lime-glow);
  color: var(--lime);
}

/* ── BARRA INFERIOR DE ABAS ── */
.mob-bottom {
  position: fixed; bottom: 0; left: 0; right: 0; background: #15171a; 
  border-top: 1px solid var(--border-hi); z-index: 9999;
  padding: 12px 14px calc(12px + env(safe-area-inset-bottom, 0));
}
.mob-tabs { display: flex; gap: 6px; align-items: center; justify-content: space-between; width: 100%; }
.mob-tab {
  flex: 1; font-family: var(--font-m); font-size: 9px; font-weight: 700; letter-spacing: .02em; text-transform: uppercase;
  border: 1px solid var(--border-hi); background: var(--s1); color: var(--muted2); padding: 12px 2px; border-radius: 10px;
  cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; height: 52px; transition: all 0.15s;
}
.mob-tab.active { background: var(--lime); color: #000; border-color: var(--lime); box-shadow: 0 4px 16px rgba(200,255,0,0.25); }
.mob-tab-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.15); }
.mob-tab.active .mob-tab-dot { background: #000; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(20,22,25,0.85); backdrop-filter: blur(25px);
  z-index: 10000; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.4s ease; padding: 24px;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal-card { background: var(--s1); border: 1px solid var(--border-hi); width: 100%; max-width: 420px; border-radius: 24px; padding: 40px 32px; text-align: center; }
.modal-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
.modal-summary-box { background: var(--s2); border-radius: 16px; padding: 20px; margin-top: 20px; }
.modal-time-val { font-family: var(--font-m); font-size: 44px; font-weight: 700; color: var(--lime); }
.modal-btn { background: var(--lime); color: #000; border: none; padding: 14px; border-radius: 12px; width: 100%; margin-top: 20px; font-weight: 700; cursor: pointer;}
</style>
</head>

<div class="app-container">
  <header class="brand-header">
    <div class="brand-title">BODY LIFE<span>.</span></div>
    <div class="brand-right">
      <select class="lang-dropdown" id="lang-sel" onchange="setLang(this.value)">
        <option value="pt">PT</option>
        <option value="en">EN</option>
        <option value="es">ES</option>
      </select>
      <div class="global-pct" id="global-pct">0%</div>
    </div>
  </header>

  <section class="control-panel">
    <div class="timer-section">
      <div class="timer-wrapper">
        <div class="lbl" id="lbl-descanso">DESCANSO</div>
        <div class="timer-display" id="main-timer">00:00</div>
      </div>
      <div class="timer-controls">
        <button class="btn-start" id="btn-toggle-timer" onclick="toggleTimer()">START</button>
        <button class="btn-reset" onclick="resetTimer()">RESET</button>
      </div>
    </div>

    <div class="workout-actions-row">
      <div class="action-btns">
        <button class="btn-train" onclick="iniciarTreino()" id="btn-iniciar">INICIAR TREINO</button>
        <button class="btn-finish" onclick="finishWorkout()" id="btn-finalizar">FINALIZAR</button>
      </div>
      <div class="secondary-timer" id="workout-timer">00:00</div>
    </div>
  </section>

  <div class="weekday-bar" id="weekday-bar"></div>

  <main class="ex-grid" id="ex-grid"></main>
</div>

<div class="mob-bottom">
  <div class="mob-tabs" id="mob-tabs"></div>
</div>

<div class="modal-overlay" id="finish-modal">
  <div class="modal-card">
    <div class="modal-title" id="modal-title">TREINO FINALIZADO!</div>
    <div class="modal-summary-box">
      <div style="font-family: var(--font-m); font-size: 11px; color: var(--muted);">TEMPO TOTAL DE TREINO</div>
      <div class="modal-time-val" id="modal-duration">00:00</div>
    </div>
    <button class="modal-btn" onclick="closeModal()">FECHAR</button>
  </div>
</div>

let lang = "pt";
let currentTab = "today"; 
let currentDay = "mon";
let restSeconds = 0;
let workoutSeconds = 0;
let restTimerInterval = null;
let workoutTimerInterval = null;

let activeOnDays = {}; 
let doneExercises = {};

const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

function init() {
  renderWeekdays();
  renderTabs();
  renderExercises();
  updateProgress();
}

function renderWeekdays() {
  const bar = document.getElementById("weekday-bar");
  bar.innerHTML = WEEKDAYS.map(day => `
    <button class="day-chip ${currentDay === day ? 'active' : ''}" onclick="setDay('${day}')">
      ${I18N[lang].weekdays[day]}
    </button>
  `).join('');
}

function renderTabs() {
  const tabsContainer = document.getElementById("mob-tabs");
  const keys = ["today", "lower", "upper", "core"];
  
  tabsContainer.innerHTML = keys.map(k => {
    const isActive = currentTab === k ? "active" : "";
    return `
      <button class="mob-tab ${isActive}" onclick="setTab('${k}')">
        <div>${I18N[lang].tabs[k]}</div>
        <div class="mob-tab-dot"></div>
      </button>
    `;
  }).join('');
}

function setDay(day) {
  currentDay = day;
  renderWeekdays();
  renderExercises();
  updateProgress();
}

function setTab(tab) {
  currentTab = tab;
  renderTabs();
  renderExercises();
}

function setLang(val) {
  lang = val;
  document.getElementById("lbl-descanso").innerText = I18N[lang].descanso;
  document.getElementById("btn-iniciar").innerText = I18N[lang].iniciar;
  document.getElementById("btn-finalizar").innerText = I18N[lang].finalizar;
  document.getElementById("modal-title").innerText = I18N[lang].modalTitle;
  document.querySelector("#finish-modal .modal-summary-box div").innerText = I18N[lang].modalSub;
  document.querySelector("#finish-modal .modal-btn").innerText = I18N[lang].modalBtn;

  renderWeekdays();
  renderTabs();
  renderExercises();
}

function getFilteredList() {
  let list = [];
  if (currentTab === "today") {
    ["lower", "upper", "core"].forEach(t => {
      EXERCISES[t].forEach(ex => {
        if (activeOnDays[ex.id]?.[currentDay]) {
          list.push(ex);
        }
      });
    });
  } else {
    list = EXERCISES[currentTab] || [];
  }
  return list;
}

function renderExercises() {
  const grid = document.getElementById("ex-grid");
  const list = getFilteredList();
  
  if (list.length === 0) {
    const msg = currentTab === "today" ? I18N[lang].emptyPlanner : I18N[lang].emptyCategory;
    grid.innerHTML = `<div style="text-align:center; color:var(--muted2); padding: 40px 20px; font-family:var(--font-m); font-size:11px; line-height:1.6;">${msg}</div>`;
    return;
  }

  grid.innerHTML = list.map(ex => {
    const isChecked = currentTab === "today" 
      ? (doneExercises[ex.id]?.[currentDay] ? "checked" : "")
      : (activeOnDays[ex.id]?.[currentDay] ? "checked" : "");

    const exerciseName = I18N[lang].names[ex.key] || ex.key;
    const groupName = I18N[lang].groups[ex.gKey] || ex.gKey;

    let tagHtml = "";
    if (currentTab !== "today") {
      const isLinked = activeOnDays[ex.id]?.[currentDay];
      tagHtml = `<div class="indicator-tag ${isLinked ? 'active' : ''}">${isLinked ? 'SALVO' : 'ADD'}</div>`;
    }

    return `
      <div class="swipe-container">
        <div class="ex-card ${currentTab === 'today' && isChecked ? 'done' : ''}">
          <div class="check-wrap">
            <input type="checkbox" ${isChecked} onchange="handleCheckChange('${ex.id}', this.checked)">
            <div class="check-box">✓</div>
          </div>
          <div class="ex-info">
            <div class="ex-name">${exerciseName}</div>
            <div class="ex-group">${groupName.toUpperCase()}</div>
          </div>
          ${tagHtml}
        </div>
      </div>
    `;
  }).join('');
}

function handleCheckChange(id, isChecked) {
  if (currentTab === "today") {
    if (!doneExercises[id]) doneExercises[id] = {};
    doneExercises[id][currentDay] = isChecked;
  } else {
    if (!activeOnDays[id]) activeOnDays[id] = {};
    activeOnDays[id][currentDay] = isChecked;
  }
  renderExercises();
  updateProgress();
}

function updateProgress() {
  let totalToday = 0;
  let doneToday = 0;

  ["lower", "upper", "core"].forEach(t => {
    EXERCISES[t].forEach(ex => {
      if (activeOnDays[ex.id]?.[currentDay]) {
        totalToday++;
        if (doneExercises[ex.id]?.[currentDay]) {
          doneToday++;
        }
      }
    });
  });

  const pct = totalToday > 0 ? Math.round((doneToday / totalToday) * 100) : 0;
  document.getElementById("global-pct").innerText = `${pct}%`;
}

// ── CONTROLADORES DOS CRONÔMETROS ──
function toggleTimer() {
  const btn = document.getElementById("btn-toggle-timer");
  if (restTimerInterval) {
    clearInterval(restTimerInterval);
    restTimerInterval = null;
    btn.innerText = "START";
  } else {
    btn.innerText = "STOP";
    restTimerInterval = setInterval(() => {
      restSeconds++;
      document.getElementById("main-timer").innerText = fmt(restSeconds);
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(restTimerInterval);
  restTimerInterval = null;
  restSeconds = 0;
  document.getElementById("main-timer").innerText = "00:00";
  document.getElementById("btn-toggle-timer").innerText = "START";
}

function iniciarTreino() {
  if (workoutTimerInterval) return;
  workoutTimerInterval = setInterval(() => {
    workoutSeconds++;
    document.getElementById("workout-timer").innerText = fmt(workoutSeconds);
  }, 1000);
}

function finishWorkout() {
  clearInterval(workoutTimerInterval);
  workoutTimerInterval = null;
  document.getElementById("modal-duration").innerText = fmt(workoutSeconds);
  document.getElementById("finish-modal").classList.add("open");
}

function closeModal() {
  document.getElementById("finish-modal").classList.remove("open");
  workoutSeconds = 0;
  document.getElementById("workout-timer").innerText = "00:00";
}

init();
</script>
