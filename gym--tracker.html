<style>
/* ── SYSTEM RESET & BASE ──────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:          #090d16; 
  --surface:     #111726; 
  --surface-hi:  #1b2336; 
  --border:      rgba(255,255,255,0.05);
  --border-hi:   rgba(255,255,255,0.12);
  --blue-brand:  #0055ff;
  --blue-electric:#0088ff;
  --blue-glow:   rgba(0,136,255,0.15);
  --cyan:        #00d2ff;
  --red:         #ff3b30;
  --green:       #34c759;
  --text:        #ffffff;
  --muted:       #64748b;
  --muted2:      #94a3b8;
  --font-d:      'Plus Jakarta Sans', sans-serif;
  --font-m:      'JetBrains Mono', monospace;
  color-scheme: dark;
}

html { height: 100%; scroll-behavior: smooth; }
body { font-family: var(--font-d); background: var(--bg); color: var(--text); min-height: 100dvh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

.app-container {
  max-width: 480px;
  margin: 0 auto;
  background: var(--bg);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: 16px 16px calc(120px + env(safe-area-inset-bottom, 0));
}

/* ── HEADER ── */
.brand-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 4px 24px; }
.brand-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; text-transform: uppercase; }
.brand-title span { color: var(--blue-electric); }
.brand-right { display: flex; align-items: center; gap: 8px; }
.lang-dropdown { background: var(--surface); color: var(--text); border: 1px solid var(--border-hi); padding: 6px 10px; border-radius: 10px; font-family: var(--font-m); font-weight: 700; font-size: 12px; outline: none; cursor: pointer; }
.global-pct { font-family: var(--font-m); font-size: 13px; font-weight: 700; background: rgba(52,199,89,0.1); color: var(--green); padding: 6px 12px; border-radius: 12px; border: 1px solid rgba(52,199,89,0.2); }

/* ── PAINEL CENTRAL DE CONTROLE ── */
.control-panel { 
  background: linear-gradient(180deg, var(--surface) 0%, #0d1321 100%);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 24px 16px;
  margin-bottom: 24px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  text-align: center;
}
.panel-title { font-size: 11px; font-weight: 700; color: var(--muted2); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 16px; }

/* Cronômetro Circular */
.circular-timer-box { position: relative; width: 150px; height: 150px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; }
.circular-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
.circular-bg { fill: none; stroke: var(--surface-hi); stroke-width: 5; }
.circular-progress { fill: none; stroke: var(--blue-electric); stroke-width: 5; stroke-linecap: round; stroke-dasharray: 440; stroke-dashoffset: 440; transition: stroke-dashoffset 1s linear; }
.timer-display { font-family: var(--font-m); font-size: 32px; font-weight: 700; color: var(--text); position: relative; z-index: 2; letter-spacing: -0.5px; }

.timer-controls { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
.btn-start { background: var(--blue-electric); color: #fff; font-size: 12px; font-weight: 700; padding: 8px 20px; border-radius: 14px; border: none; cursor: pointer; box-shadow: 0 4px 12px rgba(0,136,255,0.3); text-transform: uppercase; }
.btn-start.active { background: var(--red); box-shadow: 0 4px 12px rgba(255,59,48,0.3); }
.btn-reset { background: transparent; color: var(--muted2); border: 1px solid var(--border-hi); font-size: 12px; font-weight: 600; padding: 8px 16px; border-radius: 14px; cursor: pointer; text-transform: uppercase; }

/* Fileira de Ações de Treino */
.workout-actions-row { display: flex; background: rgba(0,0,0,0.2); padding: 6px; border-radius: 16px; align-items: center; justify-content: space-between; border: 1px solid var(--border); }
.btn-train { background: var(--surface-hi); color: var(--cyan); font-size: 11px; font-weight: 700; padding: 10px 14px; border-radius: 12px; border: 1px solid rgba(0,210,255,0.15); cursor: pointer; text-transform: uppercase; }
.secondary-timer { font-family: var(--font-m); font-size: 15px; font-weight: 700; color: #fff; }
.btn-finish { background: var(--red); color: #fff; font-size: 11px; font-weight: 700; padding: 10px 14px; border-radius: 12px; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(255,59,48,0.25); text-transform: uppercase; }

/* ── SELETOR DE DIAS (CHIPS) ── */
.weekday-bar { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding: 4px 0; }
.weekday-bar::-webkit-scrollbar { display: none; }
.day-chip { flex: 1; min-width: 58px; text-align: center; font-size: 11px; font-weight: 600; padding: 10px 4px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--muted2); cursor: pointer; transition: all 0.2s ease; }
.day-chip.active { background: var(--blue-electric); color: #fff; border-color: var(--blue-electric); font-weight: 700; box-shadow: 0 4px 12px rgba(0,136,255,0.2); }

/* ── SUB-FILTROS HORIZONTAIS ── */
.sub-filter-bar { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
.sub-filter-bar::-webkit-scrollbar { display: none; }
.filter-chip { background: var(--surface); border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; color: var(--muted2); white-space: nowrap; transition: all 0.2s; text-transform: uppercase; }
.filter-chip.active { background: #fff; color: var(--bg); border-color: #fff; font-weight: 700; }

/* ── LISTA DE EXERCÍCIOS ── */
.ex-grid { display: flex; flex-direction: column; gap: 10px; flex: 1; }
.ex-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; transition: all 0.2s ease; }
.ex-card.done { border-color: rgba(52,199,89,0.2); background: rgba(52,199,89,0.02); }
.ex-card.done .ex-name { color: var(--muted2); text-decoration: line-through; }
.ex-info { flex: 1; }
.ex-name { font-size: 14px; font-weight: 600; color: #fff; line-height: 1.4; }
.ex-group { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-top: 3px; letter-spacing: 0.5px; }

/* Checkbox Premium Redondo */
.check-wrap { width: 22px; height: 22px; position: relative; }
.check-wrap input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; margin: 0; z-index: 2; }
.check-box { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--surface-hi); background: #0c111d; display: flex; align-items: center; justify-content: center; transition: all .2s ease; color: transparent; font-size: 10px; font-weight: bold; }
.check-wrap input:checked + .check-box { background: var(--blue-electric); border-color: var(--blue-electric); color: #fff; }
.ex-card.done .check-wrap input:checked + .check-box { background: var(--green); border-color: var(--green); }

.indicator-tag { font-size: 9px; font-weight: 700; padding: 5px 10px; border-radius: 10px; background: var(--surface-hi); color: var(--muted2); }
.indicator-tag.active { background: var(--blue-glow); color: var(--cyan); }

/* ── ASSINATURA DO DESENVOLVEDOR ── */
.dev-footer { text-align: center; font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; padding: 24px 0 8px; font-family: var(--font-m); }
.dev-footer span { color: var(--blue-electric); }

/* ── TAB BAR FIXA INFERIOR ── */
.mob-bottom { position: fixed; bottom: 12px; left: 12px; right: 12px; background: rgba(17, 23, 38, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border-hi); border-radius: 20px; z-index: 9999; padding: 6px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
.mob-tabs { display: flex; width: 100%; justify-content: space-between; }
.mob-tab { flex: 1; border: none; background: transparent; color: var(--muted); padding: 10px 2px; border-radius: 14px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; height: 44px; transition: all 0.2s; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.mob-tab.active { color: #fff; background: var(--surface-hi); }
.mob-tab-dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; }
.mob-tab.active .mob-tab-dot { background: var(--blue-electric); }

/* ── MODAL DE CONCLUSÃO ── */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(9,13,22,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 10000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 20px; }
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal-card { background: var(--surface); border: 1px solid var(--border-hi); width: 100%; max-width: 340px; border-radius: 24px; padding: 28px 20px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
.modal-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
.modal-summary-box { background: rgba(0,0,0,0.2); border-radius: 16px; padding: 16px; margin-top: 16px; border: 1px solid var(--border); }
.modal-time-val { font-family: var(--font-m); font-size: 32px; font-weight: 700; color: var(--cyan); margin-top: 4px; }
.modal-btn { background: #fff; color: #000; border: none; padding: 12px; border-radius: 14px; width: 100%; margin-top: 20px; font-weight: 700; cursor: pointer; font-size: 13px; text-transform: uppercase; }
</style>
</head>

let lang = "pt";
let currentTab = "today"; 
let currentDay = "mon";
let currentSubFilter = "all";

let restSeconds = 0;
let workoutSeconds = 0;
let restTimerInterval = null;
let workoutTimerInterval = null;

let activeOnDays = {}; 
let doneExercises = {};

const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

function init() {
  renderWeekdays();
  renderTabs();
  renderSubFilters();
  renderExercises();
  updateProgress();
}

function renderWeekdays() {
  const bar = document.getElementById("weekday-bar");
  bar.innerHTML = WEEKDAYS.map(day => `
    <button class="day-chip ${currentDay === day ? 'active' : ''}" onclick="setDay('${day}')">
      ${I18N[lang].weekdays[day]}
    </button>
  `).join('');
}

function renderTabs() {
  const tabsContainer = document.getElementById("mob-tabs");
  const keys = ["today", "lower", "upper", "core"];
  
  tabsContainer.innerHTML = keys.map(k => {
    const isActive = currentTab === k ? "active" : "";
    return `
      <button class="mob-tab ${isActive}" onclick="setTab('${k}')">
        <div>${I18N[lang].tabs[k]}</div>
        <div class="mob-tab-dot"></div>
      </button>
    `;
  }).join('');
}

function renderSubFilters() {
  const subBar = document.getElementById("sub-filter-bar");
  const list = MAP_SUBGROUPS[currentTab];

  if (!list || list.length <= 1) {
    subBar.innerHTML = "";
    subBar.style.display = "none";
    return;
  }
  
  subBar.style.display = "flex";
  subBar.innerHTML = list.map(subKey => {
    const label = subKey === "all" ? I18N[lang].all : (I18N[lang].groups[subKey] || subKey);
    const isActive = currentSubFilter === subKey ? "active" : "";
    return `
      <button class="filter-chip ${isActive}" onclick="setSubFilter('${subKey}')">
        ${label.toUpperCase()}
      </button>
    `;
  }).join('');
}

function setDay(day) {
  currentDay = day;
  renderWeekdays();
  renderExercises();
  updateProgress();
}

function setTab(tab) {
  currentTab = tab;
  currentSubFilter = "all";
  renderTabs();
  renderSubFilters();
  renderExercises();
}

function setSubFilter(sub) {
  currentSubFilter = sub;
  renderSubFilters();
  renderExercises();
}

function setLang(val) {
  lang = val;
  document.getElementById("lbl-descanso").innerText = I18N[lang].descanso;
  document.getElementById("btn-iniciar").innerText = I18N[lang].iniciar;
  document.getElementById("btn-finalizar").innerText = I18N[lang].finalizar;
  document.getElementById("modal-title").innerText = I18N[lang].modalTitle;
  document.querySelector("#finish-modal .modal-summary-box div").innerText = I18N[lang].modalSub;
  document.querySelector("#finish-modal .modal-btn").innerText = I18N[lang].modalBtn;

  renderWeekdays();
  renderTabs();
  renderSubFilters();
  renderExercises();
}

function getFilteredList() {
  let list = [];
  if (currentTab === "today") {
    ["lower", "upper", "core"].forEach(t => {
      EXERCISES[t].forEach(ex => {
        if (activeOnDays[ex.id]?.[currentDay]) {
          list.push(ex);
        }
      });
    });
  } else {
    list = EXERCISES[currentTab] || [];
    if (currentSubFilter !== "all") {
      list = list.filter(ex => ex.gKey === currentSubFilter);
    }
  }
  return list;
}

function renderExercises() {
  const grid = document.getElementById("ex-grid");
  const list = getFilteredList();
  
  if (list.length === 0) {
    const msg = currentTab === "today" ? I18N[lang].emptyPlanner : I18N[lang].emptyCategory;
    grid.innerHTML = `<div style="text-align:center; color:var(--muted2); padding: 40px 20px; font-size:12px; line-height:1.6;">${msg}</div>`;
    return;
  }

  grid.innerHTML = list.map(ex => {
    const isChecked = currentTab === "today" 
      ? (doneExercises[ex.id]?.[currentDay] ? "checked" : "")
      : (activeOnDays[ex.id]?.[currentDay] ? "checked" : "");

    const exerciseName = I18N[lang].names[ex.key] || ex.key;
    const groupName = I18N[lang].groups[ex.gKey] || ex.gKey;

    let tagHtml = "";
    if (currentTab !== "today") {
      const isLinked = activeOnDays[ex.id]?.[currentDay];
      tagHtml = `<div class="indicator-tag ${isLinked ? 'active' : ''}">${isLinked ? 'SALVO' : 'ADD'}</div>`;
    }

    return `
      <div class="ex-card ${currentTab === 'today' && isChecked ? 'done' : ''}">
        <div class="check-wrap">
          <input type="checkbox" ${isChecked} onchange="handleCheckChange('${ex.id}', this.checked)">
          <div class="check-box">✓</div>
        </div>
        <div class="ex-info">
          <div class="ex-name">${exerciseName}</div>
          <div class="ex-group">${groupName.toUpperCase()}</div>
        </div>
        ${tagHtml}
      </div>
    `;
  }).join('');
}

function handleCheckChange(id, isChecked) {
  if (currentTab === "today") {
    if (!doneExercises[id]) doneExercises[id] = {};
    doneExercises[id][currentDay] = isChecked;
  } else {
    if (!activeOnDays[id]) activeOnDays[id] = {};
    activeOnDays[id][currentDay] = isChecked;
  }
  renderExercises();
  updateProgress();
}

function updateProgress() {
  let totalToday = 0;
  let doneToday = 0;

  ["lower", "upper", "core"].forEach(t => {
    EXERCISES[t].forEach(ex => {
      if (activeOnDays[ex.id]?.[currentDay]) {
        totalToday++;
        if (doneExercises[ex.id]?.[currentDay]) {
          doneToday++;
        }
      }
    });
  });

  const pct = totalToday > 0 ? Math.round((doneToday / totalToday) * 100) : 0;
  document.getElementById("global-pct").innerText = `${pct}%`;
}

function toggleTimer() {
  const btn = document.getElementById("btn-toggle-timer");
  const circle = document.getElementById("circular-progress");
  
  if (restTimerInterval) {
    clearInterval(restTimerInterval);
    restTimerInterval = null;
    btn.innerText = "START";
    btn.classList.remove("active");
  } else {
    btn.innerText = "STOP";
    btn.classList.add("active");
    restTimerInterval = setInterval(() => {
      restSeconds++;
      document.getElementById("main-timer").innerText = fmt(restSeconds);
      
      let offset = 440 - (restSeconds * 4) % 440;
      circle.style.strokeDashoffset = offset;
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(restTimerInterval);
  restTimerInterval = null;
  restSeconds = 0;
  document.getElementById("main-timer").innerText = "00:00";
  document.getElementById("btn-toggle-timer").innerText = "START";
  document.getElementById("btn-toggle-timer").classList.remove("active");
  document.getElementById("circular-progress").style.strokeDashoffset = 440;
}

function iniciarTreino() {
  if (workoutTimerInterval) return;
  workoutTimerInterval = setInterval(() => {
    workoutSeconds++;
    document.getElementById("workout-timer").innerText = fmt(workoutSeconds);
  }, 1000);
}

function finishWorkout() {
  clearInterval(workoutTimerInterval);
  workoutTimerInterval = null;
  document.getElementById("modal-duration").innerText = fmt(workoutSeconds);
  document.getElementById("finish-modal").classList.add("open");
}

function closeModal() {
  document.getElementById("finish-modal").classList.remove("open");
  workoutSeconds = 0;
  document.getElementById("workout-timer").innerText = "00:00";
}

init();
</script>
