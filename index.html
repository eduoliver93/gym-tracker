<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060810">
<title>BODY LIFE — FICHA DE TREINO</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0a0c15;
  --surface: #121524;
  --surface-light: #1a1e30;
  --border: #2a2f45;
  --primary: #00d4ff;
  --primary-dark: #0099cc;
  --secondary: #00ff9d;
  --text: #ffffff;
  --text-muted: #8a8faa;
  --accent-red: #ff3b5c;
  --accent-orange: #ffb800;
}

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.app {
  max-width: 500px;
  margin: 0 auto;
  padding-bottom: 80px;
}

/* Header */
.header {
  padding: 20px 16px;
  background: linear-gradient(135deg, #0a0c15, #0f1222);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header h1 {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.header h1 span {
  color: var(--primary);
}

.header p {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Navigation Tabs */
.tabs {
  display: flex;
  gap: 8px;
  padding: 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.tab-btn {
  flex: 1;
  padding: 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-muted);
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.tab-btn.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #000;
}

/* Day Selector */
.day-selector {
  display: flex;
  gap: 8px;
  padding: 16px;
  overflow-x: auto;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.day-btn {
  min-width: 70px;
  padding: 10px;
  background: var(--surface-light);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-muted);
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.day-btn.active {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-color: transparent;
  color: #000;
}

.day-btn .count {
  display: block;
  font-size: 10px;
  margin-top: 4px;
  opacity: 0.7;
}

/* Content */
.content {
  padding: 16px;
}

/* Exercise List */
.exercise-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 20px;
  max-height: 400px;
  overflow-y: auto;
}

.exercise-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 0.2s;
}

.exercise-card.selected {
  border-color: var(--primary);
  background: rgba(0, 212, 255, 0.08);
}

.exercise-icon {
  width: 48px;
  height: 48px;
  background: var(--surface-light);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.exercise-info {
  flex: 1;
}

.exercise-name {
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 4px;
}

.exercise-muscle {
  font-size: 10px;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.exercise-sets {
  display: flex;
  gap: 12px;
  margin-top: 6px;
}

.set-input {
  width: 70px;
  background: var(--surface-light);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 8px;
  color: var(--text);
  font-size: 11px;
  text-align: center;
  font-family: 'DM Mono', monospace;
}

.set-input:focus {
  outline: none;
  border-color: var(--primary);
}

.exercise-actions {
  display: flex;
  gap: 8px;
}

.add-btn, .remove-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 18px;
  font-weight: bold;
}

.add-btn {
  background: rgba(0, 255, 157, 0.1);
  border: 1px solid rgba(0, 255, 157, 0.3);
  color: var(--secondary);
}

.remove-btn {
  background: rgba(255, 59, 92, 0.1);
  border: 1px solid rgba(255, 59, 92, 0.3);
  color: var(--accent-red);
}

/* Muscle Group Filters */
.muscle-filters {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  overflow-x: auto;
  padding-bottom: 4px;
}

.muscle-chip {
  padding: 8px 16px;
  background: var(--surface-light);
  border: 1px solid var(--border);
  border-radius: 30px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}

.muscle-chip.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #000;
}

/* Current Workout Section */
.current-workout {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 20px;
}

.section-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.section-title span {
  color: var(--primary);
}

.workout-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.workout-item:last-child {
  border-bottom: none;
}

.workout-item-info {
  flex: 1;
}

.workout-item-name {
  font-size: 13px;
  font-weight: 600;
}

.workout-item-details {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 2px;
}

.workout-item-remove {
  background: rgba(255, 59, 92, 0.1);
  border: none;
  width: 30px;
  height: 30px;
  border-radius: 8px;
  color: var(--accent-red);
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
}

.empty-workout {
  text-align: center;
  padding: 30px;
  color: var(--text-muted);
  font-size: 12px;
}

/* Timer Component - Independente */
.timer-container {
  background: linear-gradient(135deg, var(--surface-light), var(--surface));
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  text-align: center;
  border: 1px solid var(--border);
}

.timer-circle {
  position: relative;
  width: 180px;
  height: 180px;
  margin: 0 auto 16px;
}

.timer-svg {
  transform: rotate(-90deg);
}

.timer-bg {
  fill: none;
  stroke: var(--border);
  stroke-width: 6;
}

.timer-progress {
  fill: none;
  stroke: var(--primary);
  stroke-width: 6;
  stroke-linecap: round;
  stroke-dasharray: 527;
  stroke-dashoffset: 527;
  transition: stroke-dashoffset 0.3s linear;
}

.timer-number {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'DM Mono', monospace;
  font-size: 40px;
  font-weight: 700;
  color: var(--text);
}

.timer-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.timer-controls {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-top: 16px;
}

.timer-btn {
  padding: 10px 24px;
  border-radius: 30px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
}

.timer-btn.play {
  background: var(--secondary);
  color: #000;
}

.timer-btn.pause {
  background: var(--accent-orange);
  color: #000;
}

.timer-btn.reset {
  background: var(--surface-light);
  border: 1px solid var(--border);
  color: var(--text-muted);
}

/* Save Button */
.save-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  border-radius: 14px;
  color: #000;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  transition: transform 0.2s;
}

.save-btn:active {
  transform: scale(0.98);
}

/* Workout Progress */
.workout-progress {
  background: var(--surface);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 20px;
}

.progress-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 12px;
  font-size: 12px;
}

.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 16px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--secondary), var(--primary));
  width: 0%;
  transition: width 0.3s;
}

.exercise-check-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px;
  background: var(--surface-light);
  border-radius: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.exercise-check-item.completed {
  opacity: 0.6;
}

.exercise-check-item.completed .exercise-name {
  text-decoration: line-through;
}

.exercise-check-item input {
  width: 22px;
  height: 22px;
  cursor: pointer;
}

/* Bottom Navigation */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 500px;
  margin: 0 auto;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 16px;
  gap: 8px;
}

.nav-item {
  flex: 1;
  padding: 10px;
  background: transparent;
  border: none;
  border-radius: 12px;
  color: var(--text-muted);
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.nav-item.active {
  background: var(--surface-light);
  color: var(--primary);
}

.nav-item span:first-child {
  font-size: 18px;
}

/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  text-align: center;
}

.stat-value {
  font-size: 28px;
  font-weight: 800;
  color: var(--primary);
}

.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Toast Notification */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--secondary);
  color: #000;
  padding: 12px 24px;
  border-radius: 40px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 13px;
  z-index: 1000;
  opacity: 0;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Modal */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: all 0.2s;
}

.modal.open {
  opacity: 1;
  visibility: visible;
}

.modal-content {
  background: var(--surface);
  border-radius: 24px;
  padding: 24px;
  max-width: 280px;
  text-align: center;
  border: 1px solid var(--border);
}

.modal-content h3 {
  margin-bottom: 12px;
}

.modal-content button {
  margin-top: 16px;
  padding: 10px 24px;
  background: var(--primary);
  border: none;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
}

.hidden {
  display: none;
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>BODY LIFE<span>.</span></h1>
    <p>Monte sua ficha de treino personalizada</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="ficha">📋 FICHA</button>
    <button class="tab-btn" data-tab="treino">💪 TREINO</button>
    <button class="tab-btn" data-tab="stats">📊 STATS</button>
  </div>

  <!-- FICHA DE TREINO TAB -->
  <div id="tab-ficha" class="tab-content">
    <div class="day-selector" id="day-selector"></div>
    
    <div class="content">
      <div class="muscle-filters" id="muscle-filters"></div>
      <div class="exercise-list" id="exercise-list"></div>
      
      <div class="current-workout">
        <div class="section-title">
          📌 TREINO DE <span id="current-day-name">SEGUNDA</span>
          <span id="exercise-count">0</span>
        </div>
        <div id="current-workout-list"></div>
      </div>
      
      <button class="save-btn" id="save-workout">💾 SALVAR FICHA</button>
    </div>
  </div>

  <!-- TREINO DO DIA TAB -->
  <div id="tab-treino" class="tab-content hidden">
    <div class="content">
      <!-- CRONÔMETRO INDEPENDENTE -->
      <div class="timer-container">
        <div class="timer-label">⏱️ CRONÔMETRO DE TREINO</div>
        <div class="timer-circle">
          <svg class="timer-svg" width="180" height="180" viewBox="0 0 180 180">
            <circle class="timer-bg" cx="90" cy="90" r="84"></circle>
            <circle class="timer-progress" id="timer-progress" cx="90" cy="90" r="84"></circle>
          </svg>
          <div class="timer-number" id="timer-display">00:00:00</div>
        </div>
        <div class="timer-controls">
          <button class="timer-btn play" id="timer-play">▶ PLAY</button>
          <button class="timer-btn pause" id="timer-pause">⏸ PAUSE</button>
          <button class="timer-btn reset" id="timer-reset">🔄 RESET</button>
        </div>
      </div>

      <!-- TREINO DO DIA (SEM RELAÇÃO COM O CRONÔMETRO) -->
      <div class="workout-progress">
        <div class="progress-header">
          <span>🏋️ TREINO DE <span id="today-name"></span></span>
          <span id="progress-text">0/0 concluídos</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div id="today-workout-list"></div>
      </div>
      
      <button class="save-btn" id="complete-workout">✅ FINALIZAR TREINO</button>
    </div>
  </div>

  <!-- ESTATÍSTICAS TAB -->
  <div id="tab-stats" class="tab-content hidden">
    <div class="content">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-total-workouts">0</div>
          <div class="stat-label">Treinos</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-streak">0</div>
          <div class="stat-label">Streak</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-longest-streak">0</div>
          <div class="stat-label">Recorde</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-xp">0</div>
          <div class="stat-label">XP</div>
        </div>
      </div>
      
      <div class="current-workout">
        <div class="section-title">📅 Últimos Treinos</div>
        <div id="history-list"></div>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <button class="nav-item active" data-nav="ficha">📋 FICHA</button>
    <button class="nav-item" data-nav="treino">💪 TREINO</button>
    <button class="nav-item" data-nav="stats">📊 STATS</button>
  </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast">✅ Ficha salva!</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modal-title">🎉 Treino Concluído!</h3>
    <p id="modal-message">+50 XP</p>
    <button onclick="closeModal()">Fechar</button>
  </div>
</div>

];

// ============== TIMER STATE (INDEPENDENTE) ==============
let timerSeconds = 0;
let timerInterval = null;
let isTimerRunning = false;
const CIRCUMFERENCE = 2 * Math.PI * 84; // 527.78

// ============== APP STATE ==============
let state = {
  workoutPlan: {},
  currentMuscle: "peito",
  selectedDay: "seg",
  currentTab: "ficha",
  completedExercises: {},
  workoutHistory: [],
  streak: 0,
  longestStreak: 0,
  lastWorkoutDate: null,
  totalWorkouts: 0,
  xp: 0
};

// ============== TOAST FUNCTION ==============
function showToast(message, isError = false) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.style.background = isError ? "var(--accent-red)" : "var(--secondary)";
  toast.style.color = isError ? "#fff" : "#000";
  toast.classList.add("show");
  setTimeout(() => {
    toast.classList.remove("show");
  }, 2000);
}

// ============== TIMER FUNCTIONS (INDEPENDENTES) ==============
function formatTime(seconds) {
  const hours = Math.floor(seconds / 3600);
  const minutes = Math.floor((seconds % 3600) / 60);
  const secs = seconds % 60;
  return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
}

function updateTimerDisplay() {
  document.getElementById("timer-display").textContent = formatTime(timerSeconds);
  
  // Progress circle (max 1 hour = 3600 seconds)
  const maxSeconds = 3600;
  const progress = Math.min(timerSeconds / maxSeconds, 1);
  const offset = CIRCUMFERENCE * (1 - progress);
  const progressCircle = document.getElementById("timer-progress");
  if (progressCircle) {
    progressCircle.style.strokeDasharray = CIRCUMFERENCE;
    progressCircle.style.strokeDashoffset = offset;
  }
}

function playTimer() {
  if (timerInterval) return;
  isTimerRunning = true;
  timerInterval = setInterval(() => {
    timerSeconds++;
    updateTimerDisplay();
  }, 1000);
}

function pauseTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  isTimerRunning = false;
}

function resetTimer() {
  pauseTimer();
  timerSeconds = 0;
  updateTimerDisplay();
}

// ============== STORAGE ==============
function loadData() {
  try {
    const saved = localStorage.getItem("bodylife_data");
    if (saved) {
      const data = JSON.parse(saved);
      state.workoutPlan = data.workoutPlan || {};
      state.completedExercises = data.completedExercises || {};
      state.workoutHistory = data.workoutHistory || [];
      state.streak = data.streak || 0;
      state.longestStreak = data.longestStreak || 0;
      state.lastWorkoutDate = data.lastWorkoutDate || null;
      state.totalWorkouts = data.totalWorkouts || 0;
      state.xp = data.xp || 0;
    }
  } catch(e) {}
  
  DAYS.forEach(day => {
    if (!state.workoutPlan[day.id]) state.workoutPlan[day.id] = [];
  });
  if (!state.completedExercises) state.completedExercises = {};
}

function saveData() {
  const toSave = {
    workoutPlan: state.workoutPlan,
    completedExercises: state.completedExercises,
    workoutHistory: state.workoutHistory,
    streak: state.streak,
    longestStreak: state.longestStreak,
    lastWorkoutDate: state.lastWorkoutDate,
    totalWorkouts: state.totalWorkouts,
    xp: state.xp
  };
  localStorage.setItem("bodylife_data", JSON.stringify(toSave));
}

// ============== RENDER FICHA ==============
function renderDaySelector() {
  const container = document.getElementById("day-selector");
  container.innerHTML = DAYS.map(day => {
    const count = state.workoutPlan[day.id]?.length || 0;
    return `<button class="day-btn ${state.selectedDay === day.id ? 'active' : ''}" data-day="${day.id}">${day.name.substring(0, 3)}<span class="count">${count}</span></button>`;
  }).join("");
  
  document.querySelectorAll(".day-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.selectedDay = btn.dataset.day;
      renderDaySelector();
      renderExerciseList();
      renderCurrentWorkout();
      document.getElementById("current-day-name").textContent = DAYS.find(d => d.id === state.selectedDay)?.name || "SEGUNDA";
    });
  });
}

function renderMuscleFilters() {
  const container = document.getElementById("muscle-filters");
  container.innerHTML = MUSCLES.map(muscle => `<button class="muscle-chip ${state.currentMuscle === muscle ? 'active' : ''}" data-muscle="${muscle}">${muscle.toUpperCase()}</button>`).join("");
  
  document.querySelectorAll(".muscle-chip").forEach(btn => {
    btn.addEventListener("click", () => {
      state.currentMuscle = btn.dataset.muscle;
      renderMuscleFilters();
      renderExerciseList();
    });
  });
}

function renderExerciseList() {
  const container = document.getElementById("exercise-list");
  const exercises = EXERCISES_DB[state.currentMuscle] || [];
  const currentExercises = state.workoutPlan[state.selectedDay] || [];
  const isInPlan = (id) => currentExercises.some(e => e.id === id);
  
  container.innerHTML = exercises.map(ex => {
    const exists = isInPlan(ex.id);
    return `<div class="exercise-card ${exists ? 'selected' : ''}"><div class="exercise-icon">💪</div><div class="exercise-info"><div class="exercise-name">${ex.name}</div><div class="exercise-muscle">${ex.muscle}</div><div class="exercise-sets"><input type="number" class="set-input" id="sets-${ex.id}" placeholder="Séries" value="${exists ? currentExercises.find(e => e.id === ex.id)?.sets || 4 : 4}"><input type="number" class="set-input" id="reps-${ex.id}" placeholder="Reps" value="${exists ? currentExercises.find(e => e.id === ex.id)?.reps || 12 : 12}"></div></div><div class="exercise-actions">${exists ? `<button class="remove-btn" data-id="${ex.id}">✕</button>` : `<button class="add-btn" data-id="${ex.id}" data-name="${ex.name}" data-muscle="${ex.muscle}">+</button>`}</div></div>`;
  }).join("");
  
  document.querySelectorAll(".add-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.id;
      const name = btn.dataset.name;
      const muscle = btn.dataset.muscle;
      const sets = document.getElementById(`sets-${id}`)?.value || 4;
      const reps = document.getElementById(`reps-${id}`)?.value || 12;
      if (!state.workoutPlan[state.selectedDay]) state.workoutPlan[state.selectedDay] = [];
      if (!state.workoutPlan[state.selectedDay].some(e => e.id === id)) {
        state.workoutPlan[state.selectedDay].push({ id, name, muscle, sets: parseInt(sets), reps: parseInt(reps) });
        saveData();
        renderExerciseList();
        renderCurrentWorkout();
        renderDaySelector();
        showToast(`➕ ${name} adicionado!`, false);
      }
    });
  });
  
  document.querySelectorAll(".remove-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.id;
      state.workoutPlan[state.selectedDay] = state.workoutPlan[state.selectedDay].filter(e => e.id !== id);
      saveData();
      renderExerciseList();
      renderCurrentWorkout();
      renderDaySelector();
      showToast(`✖️ Exercício removido`, false);
    });
  });
}

function renderCurrentWorkout() {
  const container = document.getElementById("current-workout-list");
  const exercises = state.workoutPlan[state.selectedDay] || [];
  if (exercises.length === 0) {
    container.innerHTML = '<div class="empty-workout">Nenhum exercício adicionado. Selecione acima 👆</div>';
    document.getElementById("exercise-count").textContent = "0";
    return;
  }
  container.innerHTML = exercises.map(ex => `<div class="workout-item"><div class="workout-item-info"><div class="workout-item-name">${ex.name}</div><div class="workout-item-details">${ex.sets} séries x ${ex.reps} reps | ${ex.muscle}</div></div><button class="workout-item-remove" data-id="${ex.id}">✕</button></div>`).join("");
  document.getElementById("exercise-count").textContent = exercises.length;
  document.querySelectorAll(".workout-item-remove").forEach(btn => {
    btn.addEventListener("click", () => {
      state.workoutPlan[state.selectedDay] = state.workoutPlan[state.selectedDay].filter(e => e.id !== btn.dataset.id);
      saveData();
      renderCurrentWorkout();
      renderExerciseList();
      renderDaySelector();
    });
  });
}

// ============== TREINO DO DIA (SEM RELAÇÃO COM TIMER) ==============
function getTodayId() {
  const days = ["dom", "seg", "ter", "qua", "qui", "sex", "sab"];
  return days[new Date().getDay()];
}

function renderTodayWorkout() {
  const todayId = getTodayId();
  const todayName = DAYS.find(d => d.id === todayId)?.name || "HOJE";
  document.getElementById("today-name").textContent = todayName;
  
  const exercises = state.workoutPlan[todayId] || [];
  const completed = state.completedExercises[todayId] || {};
  const container = document.getElementById("today-workout-list");
  
  if (exercises.length === 0) {
    container.innerHTML = '<div class="empty-workout">Nenhum treino programado para hoje! Vá na aba FICHA e monte seu treino.</div>';
    document.getElementById("progress-text").textContent = "0/0";
    document.getElementById("progress-fill").style.width = "0%";
    return;
  }
  
  let completedCount = 0;
  container.innerHTML = exercises.map(ex => {
    const isChecked = completed[ex.id] || false;
    if (isChecked) completedCount++;
    return `<div class="exercise-check-item ${isChecked ? 'completed' : ''}" data-id="${ex.id}"><div><div class="exercise-name">${ex.name}</div><div class="workout-item-details">${ex.sets} séries x ${ex.reps} reps</div></div><input type="checkbox" ${isChecked ? 'checked' : ''} data-id="${ex.id}"></div>`;
  }).join("");
  
  document.getElementById("progress-text").textContent = `${completedCount}/${exercises.length}`;
  document.getElementById("progress-fill").style.width = `${(completedCount / exercises.length * 100)}%`;
  
  document.querySelectorAll("#today-workout-list input[type='checkbox']").forEach(cb => {
    cb.addEventListener("change", (e) => {
      e.stopPropagation();
      if (!state.completedExercises[todayId]) state.completedExercises[todayId] = {};
      state.completedExercises[todayId][cb.dataset.id] = cb.checked;
      saveData();
      renderTodayWorkout();
      // NÃO INICIA O TIMER - O TIMOR É INDEPENDENTE
    });
  });
  
  document.querySelectorAll(".exercise-check-item").forEach(item => {
    item.addEventListener("click", (e) => {
      if (e.target.tagName !== 'INPUT') {
        const checkbox = item.querySelector('input');
        checkbox.checked = !checkbox.checked;
        checkbox.dispatchEvent(new Event('change'));
      }
    });
  });
}

function completeWorkout() {
  const todayId = getTodayId();
  const exercises = state.workoutPlan[todayId] || [];
  const completed = state.completedExercises[todayId] || {};
  const completedCount = exercises.filter(ex => completed[ex.id]).length;
  
  if (exercises.length === 0) {
    showToast("❌ Nenhum treino programado para hoje!", true);
    return;
  }
  if (completedCount < exercises.length) {
    showToast(`⚠️ Complete todos os ${exercises.length} exercícios!`, true);
    return;
  }
  
  const todayDate = new Date().toISOString().split("T")[0];
  state.totalWorkouts++;
  const xpEarned = 50 + Math.min(exercises.length * 5, 50);
  state.xp += xpEarned;
  
  if (state.lastWorkoutDate) {
    const diffDays = Math.round((new Date(todayDate) - new Date(state.lastWorkoutDate)) / (1000 * 60 * 60 * 24));
    state.streak = diffDays === 1 ? state.streak + 1 : diffDays > 1 ? 1 : state.streak;
  } else {
    state.streak = 1;
  }
  if (state.streak > state.longestStreak) state.longestStreak = state.streak;
  
  state.lastWorkoutDate = todayDate;
  state.workoutHistory.unshift({ date: todayDate, exercises: exercises.length, xp: xpEarned });
  if (state.workoutHistory.length > 10) state.workoutHistory.pop();
  state.completedExercises[todayId] = {};
  saveData();
  
  document.getElementById("modal-title").textContent = "🎉 TREINO CONCLUÍDO!";
  document.getElementById("modal-message").innerHTML = `+${xpEarned} XP<br>🔥 Streak: ${state.streak} dias`;
  document.getElementById("modal").classList.add("open");
  
  renderTodayWorkout();
  renderStats();
  // NÃO RESETA O TIMER - O TIMER É INDEPENDENTE
}

function renderStats() {
  document.getElementById("stat-total-workouts").textContent = state.totalWorkouts;
  document.getElementById("stat-streak").textContent = state.streak;
  document.getElementById("stat-longest-streak").textContent = state.longestStreak;
  document.getElementById("stat-xp").textContent = state.xp;
  
  const historyContainer = document.getElementById("history-list");
  if (state.workoutHistory.length === 0) {
    historyContainer.innerHTML = '<div class="empty-workout">Nenhum treino realizado ainda</div>';
  } else {
    historyContainer.innerHTML = state.workoutHistory.map(h => `<div class="workout-item"><div class="workout-item-info"><div class="workout-item-name">${h.date}</div><div class="workout-item-details">${h.exercises} exercícios</div></div><div class="workout-item-info" style="text-align:right;">+${h.xp} XP</div></div>`).join("");
  }
}

function switchTab(tabId) {
  state.currentTab = tabId;
  document.getElementById("tab-ficha").classList.add("hidden");
  document.getElementById("tab-treino").classList.add("hidden");
  document.getElementById("tab-stats").classList.add("hidden");
  document.getElementById(`tab-${tabId}`).classList.remove("hidden");
  
  document.querySelectorAll(".tab-btn, .nav-item").forEach(el => {
    el.classList.remove("active");
    if (el.dataset.tab === tabId || el.dataset.nav === tabId) el.classList.add("active");
  });
  
  if (tabId === "treino") renderTodayWorkout();
  if (tabId === "stats") renderStats();
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
}

// ============== INITIALIZE ==============
loadData();
renderDaySelector();
renderMuscleFilters();
renderExerciseList();
renderCurrentWorkout();
document.getElementById("current-day-name").textContent = "SEGUNDA";
renderStats();

// Timer Event Listeners (INDEPENDENTES)
document.getElementById("timer-play").addEventListener("click", playTimer);
document.getElementById("timer-pause").addEventListener("click", pauseTimer);
document.getElementById("timer-reset").addEventListener("click", resetTimer);

// Tab Event Listeners
document.querySelectorAll(".tab-btn").forEach(btn => btn.addEventListener("click", () => switchTab(btn.dataset.tab)));
document.querySelectorAll(".nav-item").forEach(item => item.addEventListener("click", () => switchTab(item.dataset.nav)));

// Save and Complete Buttons
document.getElementById("save-workout").addEventListener("click", () => { saveData(); showToast("✅ Ficha de treino salva!", false); });
document.getElementById("complete-workout").addEventListener("click", completeWorkout);

// Initialize timer display
updateTimerDisplay();
renderTodayWorkout();
</script>
</body>
</html>
